  // --- Small formatting helpers (DOM-free) ------------------------------

  // Degree formatted as DD MM' Sign.
  ui.fmtDeg = function fmtDeg(lon) {
    const L = normalize360(lon);
    const s = Math.floor(L / 30) % 12;
    const within = L - Math.floor(L / 30) * 30;
    let d = Math.floor(within);
    let m = Math.round((within - d) * 60);
    if (m === 60) { d += 1; m = 0; }
    return d + '\u00b0' + (m < 10 ? '0' : '') + m + "' " + ui.SIGN_NAMES[s];
  };

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function categoryLabel(key) {
    for (let i = 0; i < ui.CATEGORIES.length; i++) {
      if (ui.CATEGORIES[i].key === key) return ui.CATEGORIES[i].label;
    }
    return key;
  }

  function weekdayName(idx) {
    return ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][((idx % 7) + 7) % 7];
  }

  // Weekday (0=Sun..6=Sat) of a civil date string "YYYY-MM-DD".
  ui.weekdayOf = function weekdayOf(dateStr) {
    const dm = /^(\d{1,4})-(\d{1,2})-(\d{1,2})$/.exec(String(dateStr).trim());
    if (!dm) return null;
    const dt = new Date(Date.UTC(parseInt(dm[1], 10), parseInt(dm[2], 10) - 1, parseInt(dm[3], 10)));
    return dt.getUTCDay();
  };

  // --- Validation (Part C) ----------------------------------------------
  // Returns { ok:true, value:{...} } or { ok:false, message:'...' }.
  ui.validateInput = function validateInput(raw) {
    if (!raw.date || !/^\d{1,4}-\d{1,2}-\d{1,2}$/.test(String(raw.date).trim())) {
      return { ok: false, message: 'Please provide a valid Date.' };
    }
    if (!raw.time || !/^\d{1,2}:\d{1,2}(?::\d{1,2})?$/.test(String(raw.time).trim())) {
      return { ok: false, message: 'Please provide a valid Time.' };
    }
    const lat = parseFloat(raw.lat);
    if (raw.lat === '' || raw.lat == null || !isFinite(lat) || lat < -90 || lat > 90) {
      return { ok: false, message: 'Please provide a valid Latitude between -90 and 90.' };
    }
    const lon = parseFloat(raw.lon);
    if (raw.lon === '' || raw.lon == null || !isFinite(lon) || lon < -180 || lon > 180) {
      return { ok: false, message: 'Please provide a valid Longitude between -180 and 180.' };
    }
    const tz = parseFloat(raw.tz);
    if (raw.tz === '' || raw.tz == null || !isFinite(tz)) {
      return { ok: false, message: 'Please provide a valid numeric Timezone offset (hours).' };
    }
    const category = raw.category;
    if (!category || !interpret.CATEGORY_HOUSES[category]) {
      return { ok: false, message: 'Please select a Query category.' };
    }

    // Horary number is optional, but if present must be an integer in range.
    let horary = null;
    const hraw = (raw.horary == null) ? '' : String(raw.horary).trim();
    if (hraw !== '') {
      const n = Number(hraw);
      if (!isFinite(n) || Math.floor(n) !== n || n < 1 || n > kp.HORARY_COUNT) {
        return {
          ok: false,
          message: 'KP Horary number must be a whole number between 1 and ' +
            kp.HORARY_COUNT + ' (or left blank).'
        };
      }
      horary = n;
    }

    return {
      ok: true,
      value: {
        date: String(raw.date).trim(),
        time: String(raw.time).trim(),
        lat: lat, lon: lon, tz: tz,
        category: category,
        horary: horary,
        place: raw.place ? String(raw.place).trim() : '',
        mode: raw.mode || 'manual'
      }
    };
  };

  // --- Pipeline (DOM-free) ----------------------------------------------
  // input must already be validated. Returns { chart, result }.
  ui.runAnalysis = function runAnalysis(input) {
    const jd = astro.localToJD(input.date, input.time, input.tz);
    let weekday = ui.weekdayOf(input.date);
    if (weekday == null) weekday = astro.weekdayIndex(jd);
    const opts = {
      jd: jd,
      latitude: input.lat,
      longitude: input.lon,
      timezone: input.tz,
      weekday: weekday,
      mode: input.mode || 'manual'
    };
    if (typeof input.horary === 'number') opts.horaryNumber = input.horary;
    const chart = kp.buildChart(opts);
    const result = interpret.interpret(input.category, chart);
    return { chart: chart, result: result };
  };

  // --- Rendering helpers (DOM-free, return HTML strings) ----------------

  // Convert a "\n\n"-separated analysis string into <p> elements, bolding the
  // short leading label (text before the first period) of each paragraph.
  function renderParagraphs(text) {
    const paras = String(text || '').split(/\n\n+/);
    return paras.map(function (para) {
      const p = para.trim();
      if (!p) return '';
      const m = /^([^.]{1,60})\.\s+([\s\S]+)$/.exec(p);
      if (m) {
        return '<p><strong>' + esc(m[1]) + '.</strong> ' + esc(m[2]) + '</p>';
      }
      // Verdict lines get emphasis.
      if (/^(KP verdict|.*verdict is)/i.test(p)) {
        return '<p class="verdict-line">' + esc(p) + '</p>';
      }
      return '<p>' + esc(p) + '</p>';
    }).join('');
  }

  function card(title, bodyHtml) {
    return '<div class="card"><h2 class="section-title">' + esc(title) + '</h2>' + bodyHtml + '</div>';
  }

  function attributionHtml() {
    return '<div class="card results-attribution"><span class="dev">Developed by Dr. Anil Sabaji</span>, ' +
      'Email: <a href="mailto:anilsabaji@gmail.com">anilsabaji@gmail.com</a></div>';
  }

  // 1. Prashna Details card.
  function prashnaDetailsCard(input, chart) {
    const rows = [];
    function row(k, v) { rows.push('<tr><th>' + esc(k) + '</th><td>' + v + '</td></tr>'); }
    row('Date', esc(input.date));
    row('Time', esc(input.time));
    if (input.place) row('Place', esc(input.place));
    row('Latitude', esc(input.lat.toFixed(4)) + '&deg;');
    row('Longitude', esc(input.lon.toFixed(4)) + '&deg;');
    row('Timezone', 'UTC' + (input.tz >= 0 ? '+' : '') + input.tz);
    row('Mode', esc(chart.meta.mode === 'instant' ? 'Instant Prashna' : 'Manual Prashna'));
    row('Ayanamsa (KP)', ui.fmtDeg(chart.ayanamsa).replace(/ [A-Za-z]+$/, '') + ' (' + chart.ayanamsa.toFixed(4) + '&deg;)');
    row('Weekday', esc(weekdayName(chart.meta.weekday)));
    row('Query', esc(categoryLabel(input.category)));
    if (chart.horaryAscendant) {
      row('Horary Number', esc(chart.horaryNumber) + ' of ' + kp.HORARY_COUNT);
      row('Horary Ascendant', ui.fmtDeg(chart.horaryAscendant.degree) +
        ' &mdash; sub-lord <strong>' + esc(chart.horaryAscendant.subLord) + '</strong>' +
        ' (star-lord ' + esc(chart.horaryAscendant.starLord) + ', sign-lord ' + esc(chart.horaryAscendant.signLord) + ')');
    } else if (input.horary != null) {
      row('Horary Number', esc(input.horary) + ' (out of range &mdash; not applied)');
    } else {
      row('Horary Number', '<em>not provided</em>');
    }
    return card('Prashna Details', '<table>' + rows.join('') + '</table>');
  }

  // 5. Ruling Planets card.
  function rulingPlanetsCard(chart) {
    const rp = chart.rulingPlanets;
    const rows = [
      ['Day-Lord', rp.dayLord],
      ['Moon Sign-Lord', rp.moonSignLord],
      ['Moon Star-Lord', rp.moonStarLord],
      ['Moon Sub-Lord', rp.moonSubLord],
      ['Lagna Sign-Lord', rp.lagnaSignLord],
      ['Lagna Star-Lord', rp.lagnaStarLord],
      ['Lagna Sub-Lord', rp.lagnaSubLord]
    ];
    const body = rows.map(function (r) {
      return '<tr><th>' + esc(r[0]) + '</th><td>' + esc(r[1]) + '</td></tr>';
    }).join('');
    return card('Ruling Planets', '<table>' + body + '</table>');
  }

  // 8. Missing-item findings card.
  function missingItemCard(result) {
    const mi = result.missingItem;
    if (!mi) return '';
    const rows = [];
    function row(k, v) { rows.push('<tr><th>' + esc(k) + '</th><td>' + esc(v) + '</td></tr>'); }
    row('Status', mi.status.toUpperCase());
    row('Age', mi.age === 'old' ? 'Old / used object' : 'New / recently acquired');
    row('Significator', mi.sigPlanet);
    row('Material / type', mi.material);
    let detailHtml = '';
    if (mi.status === 'misplaced' && mi.location) {
      detailHtml = '<p>' + esc(mi.location.description) + '</p>';
    } else if (mi.status === 'lost' && mi.lostDetail) {
      row('Direction', mi.lostDetail.direction);
      row('Distance', mi.lostDetail.distance);
      row('Landmarks', mi.lostDetail.landmarks);
      detailHtml = '<p>' + esc(mi.lostDetail.description) + '</p>';
    } else if (mi.status === 'stolen' && mi.thief) {
      row('Thief profile', mi.thief.profile);
      row('Origin / bearing', mi.thief.origin);
      row('Still holds item', mi.thief.stillHasItem ? 'Likely yes' : 'May have passed it on');
      row('Recovery', (mi.thief.willRecover ? 'Indicated \u2014 ' : 'Doubtful \u2014 ') + mi.thief.timing);
    }
    return card('Missing Article \u2014 Findings', '<table>' + rows.join('') + '</table>' + detailHtml);
  }

  // Build the full results HTML (DOM-free). input is the validated value.
  ui.buildResultsHtml = function buildResultsHtml(input, chart, result) {
    let html = '';
    html += prashnaDetailsCard(input, chart);
    html += planetTableCard(chart);
    html += cuspTableCard(chart);
    html += significatorsCard(chart);
    html += rulingPlanetsCard(chart);
    html += card('KP Analysis (with Ruling Planets)', '<div class="analysis">' + renderParagraphs(result.kp) + '</div>');
    html += card('Hora Shastra Analysis', '<div class="analysis">' + renderParagraphs(result.horaShastra) + '</div>');
    if (input.category === 'missingItem') html += missingItemCard(result);
    html += attributionHtml();
    return html;
  };

  // --- Form construction -------------------------------------------------

  function categoryOptionsHtml() {
    return '<option value="">-- Select a query --</option>' +
      ui.CATEGORIES.map(function (c) {
        return '<option value="' + esc(c.key) + '">' + esc(c.label) + '</option>';
      }).join('');
  }

  function cityDatalistHtml(id) {
    // Retained for backward compatibility; the custom autocomplete dropdown
    // (see wireCityAutocomplete) is the source of truth for suggestions and
    // coordinate fill. This native datalist is no longer wired into the form.
    return '<datalist id="' + id + '">' +
      ui.CITIES.map(function (c) { return '<option value="' + esc(c.name) + '"></option>'; }).join('') +
      '</datalist>';
  }

  // Build a form (manual or instant) with id-prefixed fields.
  function buildFormHtml(prefix, mode) {
    const isInstant = (mode === 'instant');
    const btnLabel = isInstant ? 'Analyze Prashna (Now)' : 'Analyze Prashna';
    const locHidden = isInstant ? '' : ''; // manual: location block always visible
    const geoMsg = isInstant
      ? '<div id="' + prefix + '-geo" class="form-msg info"></div>'
      : '';
    const cityHint = isInstant
      ? 'Detected automatically; pick a city or edit the values below if needed.'
      : 'Start typing a city to auto-fill latitude, longitude and timezone (all editable).';

    return '' +
      '<div class="card form-card" id="' + prefix + '-form">' +
        '<div class="form-grid">' +
          '<div class="field">' +
            '<label for="' + prefix + '-date">Date</label>' +
            '<input type="date" id="' + prefix + '-date" />' +
          '</div>' +
          '<div class="field">' +
            '<label for="' + prefix + '-time">Time</label>' +
            '<input type="time" id="' + prefix + '-time" step="60" />' +
          '</div>' +
          '<div class="field full">' +
            '<label for="' + prefix + '-city">Place / City</label>' +
            '<div class="city-combo" id="' + prefix + '-city-combo">' +
              '<input type="text" id="' + prefix + '-city" ' +
                'role="combobox" aria-autocomplete="list" aria-expanded="false" ' +
                'aria-controls="' + prefix + '-city-list" ' +
                'placeholder="e.g. Mumbai" autocomplete="off" />' +
              '<ul id="' + prefix + '-city-list" role="listbox" class="city-suggestions hidden"></ul>' +
              '<div id="' + prefix + '-city-note" class="city-note hidden"></div>' +
            '</div>' +
            '<span class="hint">' + cityHint + '</span>' +
          '</div>' +
          '<fieldset class="loc-block" id="' + prefix + '-loc">' +
            '<legend>Location coordinates</legend>' +
            '<div class="form-grid">' +
              '<div class="field">' +
                '<label for="' + prefix + '-lat">Latitude</label>' +
                '<input type="number" step="any" id="' + prefix + '-lat" placeholder="-90 to 90" />' +
              '</div>' +
              '<div class="field">' +
                '<label for="' + prefix + '-lon">Longitude</label>' +
                '<input type="number" step="any" id="' + prefix + '-lon" placeholder="-180 to 180" />' +
              '</div>' +
              '<div class="field">' +
                '<label for="' + prefix + '-tz">Timezone (UTC offset, hours)</label>' +
                '<input type="number" step="any" id="' + prefix + '-tz" placeholder="e.g. 5.5" />' +
              '</div>' +
            '</div>' +
          '</fieldset>' +
          '<div class="field">' +
            '<label for="' + prefix + '-category">Query Category</label>' +
            '<select id="' + prefix + '-category">' + categoryOptionsHtml() + '</select>' +
          '</div>' +
          '<div class="field">' +
            '<label for="' + prefix + '-horary">KP Horary Number (1\u2013' + kp.HORARY_COUNT + ')</label>' +
            '<input type="number" min="1" max="' + kp.HORARY_COUNT + '" step="1" ' +
              'id="' + prefix + '-horary" placeholder="optional, 1\u2013' + kp.HORARY_COUNT + '" />' +
            '<span class="hint">Optional but recommended for KP horary analysis.</span>' +
          '</div>' +
        '</div>' +
        geoMsg +
        '<button type="button" class="btn-primary" id="' + prefix + '-analyze">' + btnLabel + '</button>' +
        '<div id="' + prefix + '-error" class="form-msg error"></div>' +
      '</div>';
  }

  // --- DOM glue ----------------------------------------------------------

  function $(id) { return document.getElementById(id); }

  function showMsg(el, text, kind) {
    if (!el) return;
    el.textContent = text;
    el.className = 'form-msg ' + (kind || 'error') + ' show';
  }
  function hideMsg(el) {
    if (!el) return;
    el.textContent = '';
    el.className = 'form-msg ' + (el.classList.contains('info') ? 'info' : 'error');
  }

  // Deterministically fill lat/lon/tz for a chosen city, independent of the
  // browser's native `change` event. Sets the input value to the city name
  // and closes the suggestion dropdown.
  function selectCity(prefix, city) {
    if (!city) return;
    const cityEl = $(prefix + '-city');
    const latEl = $(prefix + '-lat');
    const lonEl = $(prefix + '-lon');
    const tzEl = $(prefix + '-tz');
    if (latEl) latEl.value = city.lat;
    if (lonEl) lonEl.value = city.lon;
    if (tzEl) tzEl.value = city.tz;
    if (cityEl) cityEl.value = city.name;
    closeCityList(prefix);
  }

  // Hide the suggestion list and reset combobox state for a prefix.
  function closeCityList(prefix) {
    const listEl = $(prefix + '-city-list');
    const cityEl = $(prefix + '-city');
    if (listEl) {
      listEl.classList.add('hidden');
      listEl.innerHTML = '';
    }
    if (cityEl) {
      cityEl.setAttribute('aria-expanded', 'false');
      cityEl.removeAttribute('aria-activedescendant');
    }
  }

  // Wire the custom, accessible, offline city autocomplete for a form prefix.
  // Replaces the previous wireCityAutofill (native datalist + change event).
  function wireCityAutocomplete(prefix) {
    const cityEl = $(prefix + '-city');
    const listEl = $(prefix + '-city-list');
    const noteEl = $(prefix + '-city-note');
    if (!cityEl || !listEl) return;

    let matches = [];
    let activeIndex = -1;

    function setActive(idx) {
      const opts = listEl.children;
      for (let i = 0; i < opts.length; i++) opts[i].classList.remove('active');
      activeIndex = idx;
      if (idx >= 0 && idx < opts.length) {
        const opt = opts[idx];
        opt.classList.add('active');
        cityEl.setAttribute('aria-activedescendant', opt.id);
        if (opt.scrollIntoView) opt.scrollIntoView({ block: 'nearest' });
      } else {
        cityEl.removeAttribute('aria-activedescendant');
      }
    }

    function hideNote() {
      if (noteEl) { noteEl.classList.add('hidden'); noteEl.textContent = ''; }
    }
    function showNote() {
      if (noteEl) {
        noteEl.textContent = 'No matching city \u2014 enter coordinates manually';
        noteEl.classList.remove('hidden');
      }
    }

    function render() {
      listEl.innerHTML = '';
      for (let i = 0; i < matches.length; i++) {
        const c = matches[i];
        const li = document.createElement('li');
        li.id = prefix + '-city-opt-' + i;
        li.setAttribute('role', 'option');
        li.textContent = c.name;
        li.dataset.index = String(i);
        // Use mousedown to fill before the input loses focus (avoids blur race).
        li.addEventListener('mousedown', function (ev) {
          ev.preventDefault();
          const idx = Number(this.dataset.index);
          selectCity(prefix, matches[idx]);
        });
        li.addEventListener('click', function () {
          const idx = Number(this.dataset.index);
          selectCity(prefix, matches[idx]);
        });
        li.addEventListener('touchend', function (ev) {
          ev.preventDefault();
          const idx = Number(this.dataset.index);
          selectCity(prefix, matches[idx]);
        });
        listEl.appendChild(li);
      }
      listEl.classList.remove('hidden');
      cityEl.setAttribute('aria-expanded', 'true');
      setActive(-1);
    }

    cityEl.addEventListener('input', function () {
      const raw = cityEl.value;
      matches = ui.searchCities(raw);
      if (matches.length > 0) {
        hideNote();
        render();
      } else if (raw.trim() !== '') {
        closeCityList(prefix);
        showNote();
      } else {
        closeCityList(prefix);
        hideNote();
      }
    });

    cityEl.addEventListener('keydown', function (ev) {
      const open = !listEl.classList.contains('hidden') && matches.length > 0;
      if (ev.key === 'ArrowDown') {
        if (!open) return;
        ev.preventDefault();
        setActive(activeIndex + 1 >= matches.length ? 0 : activeIndex + 1);
      } else if (ev.key === 'ArrowUp') {
        if (!open) return;
        ev.preventDefault();
        setActive(activeIndex - 1 < 0 ? matches.length - 1 : activeIndex - 1);
      } else if (ev.key === 'Enter') {
        if (open && activeIndex >= 0 && activeIndex < matches.length) {
          ev.preventDefault();
          selectCity(prefix, matches[activeIndex]);
        }
      } else if (ev.key === 'Escape') {
        closeCityList(prefix);
      }
    });

    // Close the dropdown when clicking outside the combobox.
    document.addEventListener('click', function (ev) {
      const combo = $(prefix + '-city-combo');
      if (combo && !combo.contains(ev.target)) {
        closeCityList(prefix);
      }
    });
  }

  // Gather raw form values for a prefix.
  function gatherForm(prefix, mode) {
    return {
      date: $(prefix + '-date') ? $(prefix + '-date').value : '',
      time: $(prefix + '-time') ? $(prefix + '-time').value : '',
      place: $(prefix + '-city') ? $(prefix + '-city').value : '',
      lat: $(prefix + '-lat') ? $(prefix + '-lat').value : '',
      lon: $(prefix + '-lon') ? $(prefix + '-lon').value : '',
      tz: $(prefix + '-tz') ? $(prefix + '-tz').value : '',
      category: $(prefix + '-category') ? $(prefix + '-category').value : '',
      horary: $(prefix + '-horary') ? $(prefix + '-horary').value : '',
      mode: mode
    };
  }

  // Attach the analyze handler for a form prefix.
  function wireAnalyze(prefix, mode) {
    const btn = $(prefix + '-analyze');
    if (!btn) return;
    btn.addEventListener('click', function () {
      const errEl = $(prefix + '-error');
      hideMsg(errEl);
      try {
        const raw = gatherForm(prefix, mode);
        const v = ui.validateInput(raw);
        if (!v.ok) {
          showMsg(errEl, v.message, 'error');
          return;
        }
        const out = ui.runAnalysis(v.value);
        const html = ui.buildResultsHtml(v.value, out.chart, out.result);
        const results = $('results');
        if (results) {
          results.innerHTML = html;
          results.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      } catch (e) {
        showMsg(errEl, 'Could not cast the chart: ' + (e && e.message ? e.message : String(e)) +
          '. Please check your inputs and try again.', 'error');
      }
    });
  }

  // Prefill date/time with the current device moment for a prefix.
  function prefillNow(prefix) {
    const now = new Date();
    const pad = function (n) { return (n < 10 ? '0' : '') + n; };
    const dEl = $(prefix + '-date');
    const tEl = $(prefix + '-time');
    if (dEl) dEl.value = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate());
    if (tEl) tEl.value = pad(now.getHours()) + ':' + pad(now.getMinutes());
  }

  // Request geolocation for the Instant tab; fall back to manual entry.
  function requestInstantLocation() {
    const geoEl = $('instant-geo');
    const tz = -(new Date().getTimezoneOffset()) / 60;
    if ($('instant-tz') && !$('instant-tz').value) $('instant-tz').value = tz;

    if (typeof navigator === 'undefined' || !navigator.geolocation) {
      showMsg(geoEl, 'Geolocation is not available. Please enter your latitude, longitude and timezone manually below.', 'info');
      return;
    }
    showMsg(geoEl, 'Detecting your current location\u2026', 'info');
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        if ($('instant-lat')) $('instant-lat').value = pos.coords.latitude.toFixed(4);
        if ($('instant-lon')) $('instant-lon').value = pos.coords.longitude.toFixed(4);
        if ($('instant-tz') && !$('instant-tz').value) $('instant-tz').value = tz;
        showMsg(geoEl, 'Location detected. Verify the values below, then analyze.', 'info');
      },
      function () {
        showMsg(geoEl, 'Location access was denied or unavailable. Please enter your latitude, ' +
          'longitude and timezone manually below.', 'info');
      },
      { enableHighAccuracy: false, timeout: 10000, maximumAge: 600000 }
    );
  }

  let instantPrimed = false;
  function primeInstant() {
    prefillNow('instant');
    requestInstantLocation();
    instantPrimed = true;
  }

  // Build both forms and the tab switching behaviour.
  ui.init = function init() {
    const area = $('form-area');
    if (area) {
      area.innerHTML =
        '<div id="manual-pane">' + buildFormHtml('manual', 'manual') + '</div>' +
        '<div id="instant-pane" class="hidden">' + buildFormHtml('instant', 'instant') + '</div>';
    }

    // City autocomplete + analyze handlers for both forms.
    wireCityAutocomplete('manual');
    wireCityAutocomplete('instant');
    wireAnalyze('manual', 'manual');
    wireAnalyze('instant', 'instant');

    // Default the manual date/time to "now" for convenience (editable).
    prefillNow('manual');

    // Tab switching.
    const tabManual = $('tab-manual');
    const tabInstant = $('tab-instant');
    const paneManual = $('manual-pane');
    const paneInstant = $('instant-pane');

    function activate(which) {
      const manualOn = (which === 'manual');
      if (tabManual) {
        tabManual.classList.toggle('active', manualOn);
        tabManual.setAttribute('aria-selected', manualOn ? 'true' : 'false');
      }
      if (tabInstant) {
        tabInstant.classList.toggle('active', !manualOn);
        tabInstant.setAttribute('aria-selected', !manualOn ? 'true' : 'false');
      }
      if (paneManual) paneManual.classList.toggle('hidden', !manualOn);
      if (paneInstant) paneInstant.classList.toggle('hidden', manualOn);
      if (!manualOn && !instantPrimed) primeInstant();
    }

    if (tabManual) tabManual.addEventListener('click', function () { activate('manual'); });
    if (tabInstant) tabInstant.addEventListener('click', function () { activate('instant'); });

    activate('manual');
  };

  if (typeof document !== "undefined" && document.addEventListener) {
    document.addEventListener("DOMContentLoaded", function () {
      KPApp.ui.init();
    });
  }

  global.KPApp = KPApp;
  // Also expose ATTRIBUTION as a top-level constant reference for convenience.
  global.ATTRIBUTION = ATTRIBUTION;

})(typeof window !== "undefined" ? window : this);
</script>
</body>
</html>
