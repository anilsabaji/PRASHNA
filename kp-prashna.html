        return 'Classical view (enemies): the 6th house (ripu) and Mars indicate the power to overcome foes. A strong 6th lord and benefics aiding the querent give victory, while malefics in the 8th/12th and a weak lagna leave the native harassed.' + karakaTxt;
      case 'longevity':
        return 'Classical view (longevity): the lagna and its lord (the body), the 8th house (ayur) and Saturn (ayush-karaka) are weighed against the maraka lords of the 2nd and 7th. A strong, unafflicted lagna and 8th give long life; powerful marakas operating in their periods threaten it.' + karakaTxt;
      default:
        return 'Classical view: the lagna lord ' + ctx.ascLord + ' and the relevant house lord ' + houseLord + ' are weighed with the Moon\u2019s testimony.' + karakaTxt;
    }
  }

  // --- KP reasoning (elaborate, multi-paragraph) ------------------------
  interpret.kpReasoning = function kpReasoning(category, chart) {
    if (category === 'missingItem') return missingItemKp(chart);
    const ctx = buildContext(category, chart);
    const j = ctx.j;
    const primSig = chart.significators[ctx.config.primary] || [];
    const paras = [];

    // (a) houses judged
    paras.push('Houses judged for ' + ctx.label.name + ': ' + listText(ctx.houses) + '. ' + ctx.label.description);

    // (b) cusp sub-lord of the primary house and what it signifies
    paras.push('Cuspal sub-lord. The primary ' + ordinal(ctx.config.primary) + ' house cusp falls at ' +
      fmtDeg(ctx.pcusp.longitude) + ' in ' + ctx.pSign + ' (sign-lord ' + ctx.pSignLord +
      '), in the nakshatra ' + ctx.pNak + ' of star-lord ' + ctx.pStarLord +
      ', and its sub-lord is ' + ctx.pSubLord + '. In KP the cuspal sub-lord is decisive: ' +
      ctx.pSubLord + ' ' + (j.subSig.length ? ('signifies houses ' + listText(j.subSig)) : 'shows no clear house signification') + '. ' +
      (j.favHit.length ? ('Because it touches the favourable house(s) ' + listText(j.favHit) + ', it supports ' + ctx.config.yes + '. ') : '') +
      (j.negHit.length ? ('Because it also touches the negating house(s) ' + listText(j.negHit) + ', it warns of ' + ctx.config.no + '. ') : '') +
      (!j.favHit.length && !j.negHit.length ? 'Its signification is neutral, so the supporting significators and ruling planets must decide. ' : ''));

    // (c) significators in KP order
    paras.push('Significators (KP order). The significators of the ' + ordinal(ctx.config.primary) + ' house are ' +
      listText(primSig.length ? primSig : ['(none)']) + '. Across all the judged houses the chief significators are: ' +
      ctx.houses.map(function (h) {
        const s = chart.significators[h] || [];
        return ordinal(h) + ' \u2192 ' + (s.length ? listText(s) : 'none');
      }).join('; ') + '.');

    // (d) ruling planets + fructification + timing
    paras.push('Ruling Planets & fructification. At the Prashna moment the ruling planets are \u2014 day-lord ' +
      ctx.rp.dayLord + ', Moon star-lord ' + ctx.rp.moonStarLord + ', Moon sign-lord ' + ctx.rp.moonSignLord +
      ', Lagna star-lord ' + ctx.rp.lagnaStarLord + ', Lagna sign-lord ' + ctx.rp.lagnaSignLord +
      ' (Moon sub-lord ' + ctx.rp.moonSubLord + ', Lagna sub-lord ' + ctx.rp.lagnaSubLord + '). ' +
      (j.rulingAgree.length ? (listText(j.rulingAgree) + ' also signify the favourable houses') : 'none of the ruling planets clearly reinforce the favourable houses') +
      (j.rulingDeny.length ? (', while ' + listText(j.rulingDeny) + ' lean toward the negating houses') : '') + '. ' +
      (j.fructifies
        ? ('Since the ruling planets agree with the favourable significators, the query is expected to fructify; the event should mature in the conjoined dasa / bhukti of ' + listText(dedup([ctx.pSubLord].concat(j.rulingAgree.slice(0, 2)))) + '.')
        : ('Since the ruling planets do not sufficiently agree with the favourable significators, fructification is doubtful or delayed until a period of ' + listText(dedup([ctx.pSubLord].concat(j.rulingList.slice(0, 2)))) + ' operates.')));

    // category-specialised passage
    paras.push(categoryKpNote(ctx));

    // (e) verdict
    paras.push('KP verdict: ' + j.verdict + ' \u2014 the chart indicates ' + (j.favourable ? ctx.config.yes : ctx.config.no) + '.');

    return paras.join('\n\n');
  };

  // --- Hora Shastra reasoning (elaborate, classical) --------------------
  interpret.horaShastraReasoning = function horaShastraReasoning(category, chart) {
    if (category === 'missingItem') return missingItemHora(chart);
    const ctx = buildContext(category, chart);
    const j = ctx.j;
    const houseLord = ctx.pSignLord;
    const lordHouse = houseOfPlanet(chart, houseLord);
    const paras = [];

    paras.push('Classical Hora Shastra reading for ' + ctx.label.name + '. The Prashna lagna rises in ' +
      ctx.ascSign + ' at ' + fmtDeg(ctx.asc.longitude) + ', whose lord ' + ctx.ascLord +
      ' (a ' + NATURE[ctx.ascLord] + ' planet) represents the querent; the ascendant lies in the star of ' + ctx.ascStar + '.');

    paras.push('The Moon \u2014 the mind and the very life of a horary chart \u2014 is placed in ' + ctx.moonSign +
      ' in the ' + ordinal(ctx.moonHouse) + ' bhava, in the nakshatra ' + ctx.moonNak + ' (lord ' + ctx.moonStar +
      ', sub-lord ' + ctx.moonSub + '). A Moon so placed colours the query and ' +
      (j.favourable ? 'lends its support to a favourable outcome' : 'cautions that the outcome will not come easily') + '.');

    paras.push('The principal house for this question is the ' + ordinal(ctx.config.primary) +
      ' from lagna; its lord is ' + houseLord +
      (lordHouse != null ? (', posited in the ' + ordinal(lordHouse) + ' house') : '') +
      '. ' + houseLord + ' is a ' + NATURE[houseLord] + ' planet, so its ' +
      (NATURE[houseLord] === 'benefic' ? 'benefic disposition strengthens the matter'
        : (NATURE[houseLord] === 'malefic' ? 'malefic disposition can obstruct the matter unless well aspected'
          : 'mixed disposition gives a qualified result depending on its associations')) + '.');

    paras.push(categoryHoraNote(ctx, lordHouse, houseLord));

    paras.push('Weighing the strength and placement of the house lord ' + houseLord +
      ', the benefic and malefic testimonies, the karaka, and the Moon\u2019s disposition, the traditional verdict is: ' +
      (j.favourable
        ? ('the question is answered in the affirmative \u2014 ' + ctx.config.yes + '.')
        : ('the question is answered in the negative \u2014 ' + ctx.config.no + '.')));

    return paras.join('\n\n');
  };

  // --- Missing-item module ----------------------------------------------

  // Age from a cuspal sub-lord planet's nature.
  function ageOldOrNew(p) {
    // Saturn / Ketu / Rahu (and the heavy Sun, Mars) -> old; Moon / Venus / Mercury / Jupiter -> new.
    return (['Saturn', 'Ketu', 'Rahu', 'Sun', 'Mars'].indexOf(p) >= 0) ? 'old' : 'new';
  }

  // Misplaced | lost | stolen, from KP rules.
  function lossStatus(chart, psig) {
    const cusp7 = chart.cusps[6];   // finder / thief
    const cusp2 = chart.cusps[1];   // possession / recovery
    const subl7 = cusp7.subLord;
    const nodeSubLord = (subl7 === 'Rahu' || subl7 === 'Ketu');
    const nodeSig = (psig.Rahu || []).concat(psig.Ketu || []);
    const nodeOn7 = nodeSubLord || nodeSig.indexOf(7) >= 0;
    const malefic7 = isMalefic(subl7);
    const sig2 = psig[cusp2.subLord] || [];
    const withinPremises = (sig2.indexOf(4) >= 0 || sig2.indexOf(2) >= 0);
    if (nodeOn7 && malefic7) return 'stolen';
    if (!malefic7 && withinPremises) return 'misplaced';
    return 'lost';
  }

  // Probable present location when misplaced.
  function locationDetail(chart, sigPlanet, psig) {
    const p = planetByName(chart, sigPlanet);
    const lon = p ? p.longitude : chart.cusps[1].longitude;
    const sign = signOf(lon);
    const el = SIGN_ELEMENT[sign];
    const placeByEl = {
      fire: 'near a source of heat \u2014 the kitchen, an electrical fitting, a heater or a fireplace',
      earth: 'on or near the ground \u2014 a cupboard, drawer, store-room or a low shelf',
      air: 'high up \u2014 on an upper shelf, loft, rack or some raised place',
      water: 'near water \u2014 the bathroom, kitchen sink, a wet area or close to a container of liquid'
    };
    const sig = psig[sigPlanet] || [];
    const inHouse = (sig.indexOf(4) >= 0 || sig.indexOf(2) >= 0);
    return {
      element: el, sign: SIGN_NAMES[sign], inHouse: inHouse,
      description: 'The article is most probably ' +
        (inHouse ? 'within the premises itself' : 'just outside or at the very edge of the premises') +
        ', ' + placeByEl[el] + '. The significator ' + sigPlanet + ' in the ' + el +
        ' sign ' + SIGN_NAMES[sign] + ' points to such a spot.'
    };
  }

  // Direction / distance / landmarks when lost.
  function lostDetail(chart, sigPlanet, psig) {
    const p = planetByName(chart, sigPlanet);
    const lon = p ? p.longitude : chart.cusps[1].longitude;
    const sign = signOf(lon);
    const el = SIGN_ELEMENT[sign];
    const dir = DIRECTION[sigPlanet] || 'an uncertain bearing';
    const house = p ? houseOfPlanet(chart, sigPlanet) : null;
    let distance = 'a medium distance';
    if (house != null) {
      if (houseClass(house) === 'angular') distance = 'near';
      else if (houseClass(house) === 'succedent') distance = 'a medium distance';
      else distance = 'far';
    }
    const landmarkByEl = {
      fire: 'a kitchen, factory, furnace or a temple with a sacred fire',
      earth: 'a garden, field, tree, mound, or a cupboard / store',
      air: 'a tall building, tower, terrace or an open windy place',
      water: 'a well, tank, river, drain or another water body'
    };
    return {
      direction: dir, distance: distance, landmarks: landmarkByEl[el],
      description: 'The article was lost toward the ' + dir + ' (the direction of its significator ' + sigPlanet +
        '), at ' + distance + ' from the place of enquiry (the significator stands in ' +
        (house != null ? ('the ' + ordinal(house) + ' \u2014 a ' + houseClass(house) + ' \u2014 house') : 'a cadent house') +
        '). Look for landmarks such as ' + landmarkByEl[el] + '.'
    };
  }

  // Thief profile / origin / possession / recovery when stolen.
  function thiefDetail(chart, psig) {
    const cusp7 = chart.cusps[6];
    const thiefPlanet = cusp7.subLord;
    const tp = planetByName(chart, thiefPlanet);
    const thouse = tp ? houseOfPlanet(chart, thiefPlanet) : 7;
    const sign = tp ? signOf(tp.longitude) : cusp7.sign;
    const origin = (DIRECTION[thiefPlanet] || 'an unknown direction') + ' (from ' + SIGN_NAMES[sign] + ')';

    const sig11 = psig[chart.cusps[10].subLord] || [];
    const sig2 = psig[chart.cusps[1].subLord] || [];
    const stillHas = (sig11.indexOf(2) >= 0 || sig11.indexOf(11) >= 0 || sig2.indexOf(2) >= 0);

    const rp = chart.rulingPlanets;
    const rl = dedup([rp.dayLord, rp.moonStarLord, rp.moonSignLord, rp.lagnaStarLord, rp.lagnaSignLord]);
    const sig2nd = chart.significators[2] || [];
    const sig11th = chart.significators[11] || [];
    const willRecover = rl.some(function (n) { return sig2nd.indexOf(n) >= 0 || sig11th.indexOf(n) >= 0; });

    return {
      profile: buildFromPlanet(thiefPlanet) + '; in relationship, ' + relationFromHouse(thouse),
      origin: origin,
      stillHasItem: stillHas,
      willRecover: willRecover,
      timing: willRecover
        ? ('recovery is shown during the period of ' + listText(dedup(rl).slice(0, 2)))
        : 'recovery is not promised in the near term'
    };
  }

  function relationFromHouse(h) {
    switch (h) {
      case 2: case 4: return 'a member of the household or family';
      case 3: return 'a sibling, neighbour or someone living close by';
      case 5: case 11: return 'a known person, friend or acquaintance';
      case 6: return 'a servant, employee or subordinate';
      case 7: return 'an outsider or complete stranger';
      case 10: return 'someone in authority or a known professional';
      default: return 'a person connected with the ' + ordinal(h) + ' house';
    }
  }
  function buildFromPlanet(p) {
    const m = {
      Sun: 'a confident, authoritative person of medium build',
      Moon: 'a young, fair or round-faced person',
      Mars: 'a strong, energetic young male, possibly with a scar or reddish complexion',
      Mercury: 'a youthful, clever and talkative person',
      Jupiter: 'an elderly, stout or respectable-looking person',
      Venus: 'an attractive, well-dressed person, possibly female',
      Saturn: 'a thin, dark, older person, slow in manner',
      Rahu: 'a cunning, unconventional or foreign-looking person',
      Ketu: 'a strange, reclusive or unpredictable person'
    };
    return m[p] || ('a person of the nature of ' + p);
  }

  // Structured missing-item judgment.
  interpret.judgeMissingItem = function judgeMissingItem(chart) {
    const psig = interpret.planetHouseSignifications(chart);
    const cusp2 = chart.cusps[1];
    const cusp4 = chart.cusps[3];
    const sigPlanet = cusp2.subLord;            // sub-lord of the 2nd cusp = the article
    const ageLord = cusp4.subLord;              // sub-lord of the 4th cusp = age of the article
    const age = ageOldOrNew(ageLord);
    const material = MATERIAL[sigPlanet] || MATERIAL.Mercury;
    const status = lossStatus(chart, psig);

    const out = {
      age: age, ageLord: ageLord, sigPlanet: sigPlanet, material: material,
      status: status, location: null, lostDetail: null, thief: null
    };
    if (status === 'misplaced') out.location = locationDetail(chart, sigPlanet, psig);
    else if (status === 'lost') out.lostDetail = lostDetail(chart, sigPlanet, psig);
    else out.thief = thiefDetail(chart, psig);
    return out;
  };

  // Elaborate KP prose for the missing-item query.
  function missingItemKp(chart) {
    const mi = interpret.judgeMissingItem(chart);
    const houses = CATEGORY_HOUSES.missingItem;
    const rp = chart.rulingPlanets;
    function sigOf(h) { const s = chart.significators[h] || []; return s.length ? listText(s) : 'none'; }
    const paras = [];

    paras.push('Houses judged for the missing article: ' + listText(houses) +
      '. In KP the 2nd shows possession and recovery, the 11th the return of the article, the 4th the place / within the premises, the 7th the finder or thief, and the 6th the loss or theft itself.');

    paras.push('Nature of the article. Its significator is ' + mi.sigPlanet +
      ' (the sub-lord of the 2nd cusp), which by its nature points to ' + mi.material +
      '. The sub-lord of the 4th cusp, ' + mi.ageLord + ', shows the article is ' + mi.age.toUpperCase() +
      ' (' + (mi.age === 'old' ? 'an older or used object' : 'a new or recently acquired object') + ').');

    paras.push('Classification. The sub-lord of the 7th cusp is ' + chart.cusps[6].subLord +
      ' (' + NATURE[chart.cusps[6].subLord] + '); weighing node-involvement and the benefic / malefic testimony against the 2nd and 11th connections, the article is judged to be ' +
      mi.status.toUpperCase() + '.');

    if (mi.status === 'misplaced') {
      paras.push('As a misplaced article. ' + mi.location.description +
        ' The matter is one of oversight rather than true loss, so a careful search of the indicated spot should restore it.');
    } else if (mi.status === 'lost') {
      paras.push('As a lost article. ' + mi.lostDetail.description +
        ' Direction: ' + mi.lostDetail.direction + '; distance: ' + mi.lostDetail.distance +
        '; landmarks: ' + mi.lostDetail.landmarks + '.');
    } else {
      const t = mi.thief;
      paras.push('As a stolen article. The thief appears to be ' + t.profile + ', coming from ' + t.origin +
        '. The thief ' + (t.stillHasItem ? 'still appears to hold the article' : 'may have already passed on or disposed of the article') +
        '. Recovery is ' + (t.willRecover ? ('indicated \u2014 ' + t.timing + '.') : ('doubtful \u2014 ' + t.timing + '.')));
    }

    const recoverers = (chart.significators[2] || []).concat(chart.significators[11] || []);
    const rulingSet = [rp.dayLord, rp.moonStarLord, rp.moonSignLord, rp.lagnaStarLord, rp.lagnaSignLord];
    const supported = recoverers.some(function (n) { return rulingSet.indexOf(n) >= 0; });
    paras.push('Ruling Planets. Day-lord ' + rp.dayLord + ', Moon star-lord ' + rp.moonStarLord +
      ', Lagna star-lord ' + rp.lagnaStarLord + ', Lagna sign-lord ' + rp.lagnaSignLord +
      '. The recovery houses are signified by \u2014 2nd: ' + sigOf(2) + '; 11th: ' + sigOf(11) + '. ' +
      (supported ? 'A ruling planet also signifies the 2nd / 11th, so recovery is supported and timed by its period.'
        : 'No ruling planet strongly signifies the 2nd / 11th, so recovery is weak and uncertain.'));

    return paras.join('\n\n');
  }

  // Elaborate classical prose for the missing-item query.
  function missingItemHora(chart) {
    const mi = interpret.judgeMissingItem(chart);
    const asc = chart.ascendant;
    const moon = planetByName(chart, 'Moon');
    const paras = [];

    paras.push('Classical reading for the missing article. The lagna is ' + SIGN_NAMES[asc.sign] +
      ' (lord ' + asc.signLord + '), and the Moon is in ' + SIGN_NAMES[moon.sign] +
      ' in the nakshatra ' + moon.nakshatraName + ' (lord ' + moon.starLord +
      '). The sign tenanted by the indicating planet describes the article and the place where it rests.');

    paras.push('By the nature of the indicating planet ' + mi.sigPlanet + ', the article belongs to the class of ' +
      mi.material + ', and the 4th-cusp testimony of ' + mi.ageLord + ' shows it to be ' + (mi.age === 'old' ? 'an old' : 'a new') + ' object.');

    if (mi.status === 'misplaced') {
      paras.push('The testimony shows the article is merely MISPLACED, not truly gone. ' +
        mi.location.description + ' Search calmly within reach before assuming a loss.');
    } else if (mi.status === 'lost') {
      paras.push('The testimony shows the article is LOST. ' + mi.lostDetail.description +
        ' The classical direction (' + mi.lostDetail.direction + ') and landmarks (' + mi.lostDetail.landmarks +
        ') should guide the search.');
    } else {
      const t = mi.thief;
      paras.push('The testimony shows the article is STOLEN. The traditional description of the taker: ' +
        t.profile + ', arriving from ' + t.origin + '. ' +
        (t.stillHasItem ? 'The article is likely still with the taker.' : 'The article may already have changed hands.') +
        ' ' + (t.willRecover ? ('Signs favour eventual recovery \u2014 ' + t.timing + '.') : ('Signs do not favour recovery \u2014 ' + t.timing + '.')));
    }

    paras.push('The Moon\u2019s placement and the benefic or malefic planets aspecting the relevant houses confirm the above: a benefic testimony eases recovery, while a malefic \u2014 especially with the nodes Rahu or Ketu \u2014 hardens the loss.');

    return paras.join('\n\n');
  }

  // --- Public dispatch ---------------------------------------------------
  // interpret(category, chart) -> { category, label, houses, horaShastra, kp, missingItem }
  interpret.interpret = function interpretQuery(category, chart) {
    if (!CATEGORY_HOUSES[category]) throw new Error('Unknown query category: ' + category);
    const label = interpret.CATEGORY_LABELS[category];
    return {
      category: category,
      label: label ? label.name : category,
      houses: CATEGORY_HOUSES[category].slice(),
      horaShastra: interpret.horaShastraReasoning(category, chart),
      kp: interpret.kpReasoning(category, chart),
      missingItem: (category === 'missingItem') ? interpret.judgeMissingItem(chart) : null
    };
  };

  // Convenience top-level alias.
  KPApp.interpretQuery = interpret.interpret;

  /* =====================================================================
   * MOOKA PRASHNA (SILENT QUERY) ENGINE  (interpret.analyzeMookaPrashna)
   * ---------------------------------------------------------------------
   * A pure, DOM-free inference engine that deduces the subject(s) most
   * likely occupying a silent querent's mind from the astrological moment
   * alone (no stated question, no chosen category). It layers a
   * deterministic house-scoring + house -> category mapping on top of the
   * existing KP significator, ruling-planet and dual-system reasoning
   * machinery. It never mutates the chart and performs no DOM / storage /
   * network / time / randomness access. Reuses planetHouseSignifications,
   * kpReasoning, horaShastraReasoning, CATEGORY_HOUSES, CATEGORY_LABELS,
   * CATEGORY_KARAKA and kp.houseOfLongitude.
   * ===================================================================== */

  // Fixed scoring weights (module constants) so the output is reproducible.
  const MOOKA_WEIGHTS = {
    ascSubLord:   5.0,  // ascendant sub-lord -- the matter itself (strongest KP indicator)
    moonOccupied: 3.0,  // house the Moon physically occupies (the active mind)
    moonStarLord: 2.5,  // houses the Moon's star-lord signifies
    moonSubLord:  2.0,  // houses the Moon's sub-lord signifies
    moonOwned:    1.5,  // house owned by the Moon (Cancer cusp)
    rulingPlanet: 2.0,  // per ruling planet that signifies the house (fructification)
    tenancy:      1.0   // per planet occupying the house
  };
  const MOOKA_KARAKA_BONUS = 2.0; // added when a category's karaka is a strong indicator
  const MOOKA_MAX_CANDIDATES = 5; // cap on the ranked list returned
  interpret.MOOKA_WEIGHTS = MOOKA_WEIGHTS;
  interpret.MOOKA_KARAKA_BONUS = MOOKA_KARAKA_BONUS;
  interpret.MOOKA_MAX_CANDIDATES = MOOKA_MAX_CANDIDATES;

  // Phase 1 -- score the twelve houses from the silent-prashna indicators.
  // Returns { score:{1..12}, evidence... }; never mutates the chart.
  function mookaScoreHouses(chart) {
    if (!chart || !chart.significators || !chart.rulingPlanets) {
      throw new Error('analyzeMookaPrashna requires a built chart with significators and ruling planets');
    }
    const W = MOOKA_WEIGHTS;
    const psig = interpret.planetHouseSignifications(chart);
    const score = {};
    for (let h = 1; h <= 12; h++) score[h] = 0;

    function addSignified(planet, weight) {
      const hs = psig[planet] || [];
      for (let i = 0; i < hs.length; i++) {
        const h = hs[i];
        if (h >= 1 && h <= 12) score[h] += weight;
      }
    }

    // (1) Ascendant sub-lord -- the primary indicator of the matter in KP.
    const ascSub = chart.ascendant.subLord;
    addSignified(ascSub, W.ascSubLord);

    // (2) Moon = manas (the mind). Several Moon-linked contributions.
    const cuspLons = cuspLonsOf(chart);
    const moonPlanet = planetByName(chart, 'Moon');
    const moonHouse = moonPlanet ? houseOfLongitude(moonPlanet.longitude, cuspLons) : null;
    if (moonHouse != null && moonHouse >= 1 && moonHouse <= 12) score[moonHouse] += W.moonOccupied;

    const rp = chart.rulingPlanets;
    addSignified(rp.moonStarLord, W.moonStarLord);
    addSignified(rp.moonSubLord, W.moonSubLord);

    // House owned by the Moon (the Cancer cusp), if any.
    let moonOwnedHouse = null;
    for (let i = 0; i < chart.cusps.length; i++) {
      if (chart.cusps[i].signLord === 'Moon') { moonOwnedHouse = chart.cusps[i].house; break; }
    }
    if (moonOwnedHouse != null) score[moonOwnedHouse] += W.moonOwned;

    // (3) Ruling planets jointly signify houses -> fructification weight.
    const rulingList = dedup([
      rp.dayLord, rp.moonSignLord, rp.moonStarLord, rp.moonSubLord,
      rp.lagnaSignLord, rp.lagnaStarLord, rp.lagnaSubLord
    ]);
    const signifiedCount = {};
    for (let h = 1; h <= 12; h++) signifiedCount[h] = 0;
    rulingList.forEach(function (planet) {
      const hs = psig[planet] || [];
      hs.forEach(function (h) {
        if (h >= 1 && h <= 12) { score[h] += W.rulingPlanet; signifiedCount[h] += 1; }
      });
    });

    // (4) Tenancy -- a strongly tenanted house draws the mind.
    const tenancy = {};
    for (let h = 1; h <= 12; h++) tenancy[h] = 0;
    chart.planets.forEach(function (p) {
      const h = houseOfLongitude(p.longitude, cuspLons);
      if (h >= 1 && h <= 12) tenancy[h] += 1;
    });
    for (let h = 1; h <= 12; h++) score[h] += tenancy[h] * W.tenancy;

    const rulingSignifiedHouses = [];
    for (let h = 1; h <= 12; h++) if (signifiedCount[h] >= 2) rulingSignifiedHouses.push(h);

    return {
      score: score,
      psig: psig,
      ascSubLord: ascSub,
      ascSubLordHouses: (psig[ascSub] || []).slice(),
      moonHouse: moonHouse,
      moonOwnedHouse: moonOwnedHouse,
      moonStarLord: rp.moonStarLord,
      moonStarLordHouses: (psig[rp.moonStarLord] || []).slice(),
      moonSubLord: rp.moonSubLord,
      moonSubLordHouses: (psig[rp.moonSubLord] || []).slice(),
      rulingList: rulingList,
      rulingSignifiedHouses: rulingSignifiedHouses,
      tenancy: tenancy
    };
  }

  // Phase 2 -- map house scores to life-area (category) scores.
  function mookaScoreCategories(houseScore, chart, strongIndicators) {
    const catScore = {};
    Object.keys(CATEGORY_HOUSES).forEach(function (category) {
      const houses = CATEGORY_HOUSES[category];
      let s = 0;
      const planetsSet = {};
      houses.forEach(function (h) {
        s += houseScore[h] || 0;
        (chart.significators[h] || []).forEach(function (planet) { planetsSet[planet] = true; });
      });
      // Karaka reinforcement: boost when the area's significator planet is
      // itself a strong indicator (asc sub-lord, a Moon lord, or a ruling planet).
      const karaka = CATEGORY_KARAKA[category];
      if (karaka && strongIndicators.indexOf(karaka) >= 0) s += MOOKA_KARAKA_BONUS;
      const planets = Object.keys(planetsSet).sort(function (a, b) {
        return kp.BODIES.indexOf(a) - kp.BODIES.indexOf(b);
      });
      catScore[category] = { score: s, houses: houses.slice(), planets: planets };
    });
    return catScore;
  }

  // Phase 3 -- rank, normalize and assemble the MookaResult.
  interpret.analyzeMookaPrashna = function analyzeMookaPrashna(chart) {
    if (!chart || !chart.significators || !chart.rulingPlanets) {
      throw new Error('analyzeMookaPrashna requires a built chart with significators and ruling planets');
    }
    const ev = mookaScoreHouses(chart);
    const rp = chart.rulingPlanets;
    const strongIndicators = dedup(
      [ev.ascSubLord, rp.moonStarLord, rp.moonSubLord, rp.moonSignLord].concat(ev.rulingList)
    );
    const catScore = mookaScoreCategories(ev.score, chart, strongIndicators);

    // Deterministic ordering: score DESC, then fixed CATEGORY order, then key ASC.
    const categoryOrder = Object.keys(CATEGORY_HOUSES);
    const orderIndex = {};
    categoryOrder.forEach(function (k, i) { orderIndex[k] = i; });

    const ranked = Object.keys(catScore).map(function (k) {
      return {
        category: k, score: catScore[k].score,
        houses: catScore[k].houses, planets: catScore[k].planets
      };
    }).sort(function (a, b) {
      if (b.score !== a.score) return b.score - a.score;
      if (orderIndex[a.category] !== orderIndex[b.category]) return orderIndex[a.category] - orderIndex[b.category];
      return a.category < b.category ? -1 : (a.category > b.category ? 1 : 0);
    });

    // Keep meaningful candidates; always keep at least one (degenerate fallback).
    let top = ranked.filter(function (c) { return c.score > 0; }).slice(0, MOOKA_MAX_CANDIDATES);
    if (top.length === 0) top = [ranked[0]];

    let total = 0;
    top.forEach(function (c) { total += c.score; });

    function round4(x) { return Math.round(x * 10000) / 10000; }

    const candidates = top.map(function (c) {
      // Normalize over the returned set; guard divide-by-zero. Confidences
      // sum to <= 1 (raw normalization), each strictly > 0 since score > 0.
      const confidence = (total > 0) ? (c.score / total) : (1 / top.length);
      const labelObj = interpret.CATEGORY_LABELS[c.category];
      const label = (labelObj && labelObj.name) ? labelObj.name : c.category;
      return {
        category: c.category,
        label: label,
        houses: c.houses.slice(),
        planets: c.planets.slice(),
        score: c.score,
        confidence: confidence,
        confidencePct: Math.round(round4(confidence) * 100),
        kp: interpret.kpReasoning(c.category, chart),
        hora: interpret.horaShastraReasoning(c.category, chart)
      };
    });

    const headline = 'The querent is most likely thinking about ' +
      candidates[0].label + ' (' + candidates[0].confidencePct + '% relative likelihood).';

    return {
      headline: headline,
      candidates: candidates,
      indicators: {
        ascSubLord: ev.ascSubLord,
        ascSubLordHouses: ev.ascSubLordHouses,
        moon: {
          house: ev.moonHouse,
          ownHouse: ev.moonOwnedHouse,
          starLord: ev.moonStarLord,
          starLordHouses: ev.moonStarLordHouses,
          subLord: ev.moonSubLord,
          subLordHouses: ev.moonSubLordHouses
        },
        rulingPlanets: ev.rulingList.slice(),
        rulingSignifiedHouses: ev.rulingSignifiedHouses.slice(),
        tenancy: ev.tenancy
      },
      houseScores: ev.score,
      attribution: ATTRIBUTION
    };
  };

  /* =====================================================================
   * COMPREHENSIVE ANSWER ENGINE  (interpret.answerQuestion)
   * ---------------------------------------------------------------------
   * Layers a who / when / where / how / whether / why interrogative
   * breakdown on top of the existing dual-system (KP + Hora Shastra)
   * reasoning. Pure and DOM-free; performs no network or storage access.
   * Reuses gatherJudgment, kpReasoning, horaShastraReasoning,
   * judgeMissingItem, buildFromPlanet, relationFromHouse, DIRECTION and
   * SIGN_ELEMENT. Returns an AnswerObject (see design.md).
   * ===================================================================== */

  // House whose cusp sub-lord best describes the "person" of a question.
  const WHO_HOUSE = {
    marriage: 7, litigation: 7, children: 5, enemies: 6,
    siblings: 3, career: 10, gains: 11, fortune: 9, property: 4
  };

  function whoHouseFor(handler, j) {
    return WHO_HOUSE[handler] || j.primary;
  }

  function buildWhether(j, config) {
    const text = 'The cuspal sub-lord ' + j.subLord + ' of the ' + ordinal(j.primary) +
      ' house ' + (j.subSig.length ? ('signifies houses ' + listText(j.subSig)) : 'shows no clear house signification') + '. ' +
      (j.favHit.length ? ('It touches the favourable house(s) ' + listText(j.favHit) + '. ') : '') +
      (j.negHit.length ? ('It touches the negating house(s) ' + listText(j.negHit) + '. ') : '') +
      'Weighing these significators against the ruling planets, the verdict is ' + j.verdict +
      ' \u2014 the chart indicates ' + (j.favourable ? config.yes : config.no) + '.';
    return { verdict: j.verdict, favourable: j.favourable, fructifies: j.fructifies, text: text };
  }

  function buildWhy(question, chart, j) {
    const houses = question.governingHouses.slice();
    const rulingPlanets = { list: j.rulingList, agree: j.rulingAgree, deny: j.rulingDeny };
    const parts = houses.map(function (h) {
      const s = j.sigByHouse[h] || [];
      return ordinal(h) + ' \u2192 ' + (s.length ? listText(s) : 'none');
    });
    const text = 'The matter is judged from the governing house(s) ' + listText(houses) +
      '. The decisive cuspal sub-lord is ' + j.subLord + ' (signifying ' +
      (j.subSig.length ? listText(j.subSig) : 'no clear house') + '). House significators \u2014 ' +
      parts.join('; ') + '. The ruling planets are ' + listText(j.rulingList) +
      (j.rulingAgree.length ? ('; of these ' + listText(j.rulingAgree) + ' reinforce the favourable houses')
        : '; none clearly reinforce the favourable houses') +
      (j.rulingDeny.length ? (', while ' + listText(j.rulingDeny) + ' lean toward the negating houses') : '') + '.';
    return {
      houses: houses, subLord: j.subLord, significators: j.sigByHouse,
      rulingPlanets: rulingPlanets, text: text
    };
  }

  function buildWhen(j) {
    const agents = dedup([j.subLord].concat(
      j.rulingAgree.length ? j.rulingAgree.slice(0, 2) : j.rulingList.slice(0, 2)));
    const text = j.fructifies
      ? ('The matter is timed by the dasa / bhukti of the fructifying significators and ruling planets ' +
        listText(agents) + '; the event should mature when these conjoined periods operate.')
      : ('Fructification is delayed; the matter is likely to mature only in a later conjoined dasa / bhukti of ' +
        listText(agents) + ', as the ruling planets do not yet fully agree with the favourable significators.');
    return { text: text };
  }

  function buildWho(handler, chart, j) {
    const h = whoHouseFor(handler, j);
    const cusp = chart.cusps[h - 1];
    const planet = cusp.subLord;
    const profile = buildFromPlanet(planet) + '; in relationship, ' + relationFromHouse(h);
    const text = 'The person concerned is shown by the sub-lord of the ' + ordinal(h) + ' cusp, ' +
      planet + ', described as ' + buildFromPlanet(planet) + '. By house, this points to ' +
      relationFromHouse(h) + '.';
    return { planet: planet, house: h, profile: profile, text: text };
  }

  function buildWhere(chart, j) {
    const planet = j.subLord;
    const p = planetByName(chart, planet);
    const lon = p ? p.longitude : chart.cusps[j.primary - 1].longitude;
    const sign = signOf(lon);
    const element = SIGN_ELEMENT[sign];
    const direction = DIRECTION[planet] || 'an uncertain bearing';
    const signName = SIGN_NAMES[sign];
    const text = 'The place or direction is indicated by the significator ' + planet +
      ', standing in the ' + element + ' sign ' + signName + ', and pointing toward the ' + direction + '.';
    return { planet: planet, sign: signName, element: element, direction: direction, text: text };
  }

  function buildHow(j) {
    const supporting = dedup(j.favHit.map(function (h) { return ordinal(h) + ' house'; }).concat(j.rulingAgree));
    const obstructing = dedup(j.negHit.map(function (h) { return ordinal(h) + ' house'; }).concat(j.rulingDeny));
    const text = 'Supporting factors: ' + (supporting.length ? listText(supporting) : 'few clear supports') +
      ' (favourable houses touched by the sub-lord and the agreeing ruling planets). Obstructing factors: ' +
      (obstructing.length ? listText(obstructing) : 'no strong obstruction') +
      ' (negating houses and the denying ruling planets). The outcome unfolds through the balance of these forces.';
    return { supporting: supporting, obstructing: obstructing, text: text };
  }

  // Build the AnswerObject for the missing/lost-article branch.
  function answerMissingItem(question, chart, wants) {
    const mi = interpret.judgeMissingItem(chart);
    const houses = (question.governingHouses && question.governingHouses.length)
      ? question.governingHouses.slice() : CATEGORY_HOUSES.missingItem.slice();
    const kpText = interpret.kpReasoning('missingItem', chart);
    const horaText = interpret.horaShastraReasoning('missingItem', chart);
    const recovered = (mi.status === 'misplaced') || !!(mi.thief && mi.thief.willRecover);

    const whether = {
      verdict: recovered ? 'YES' : 'DOUBTFUL',
      favourable: !!recovered,
      fructifies: !!recovered,
      text: 'The article is judged to be ' + mi.status.toUpperCase() + '. ' +
        (mi.status === 'misplaced'
          ? 'As it is merely misplaced, recovery is likely upon a careful search of the indicated spot.'
          : (mi.status === 'lost'
            ? 'As it is lost, recovery depends on the 2nd / 11th significators and the ruling planets.'
            : ('As it is stolen, recovery is ' + (mi.thief && mi.thief.willRecover ? 'indicated.' : 'doubtful.'))))
    };

    const why = {
      houses: houses,
      subLord: chart.cusps[1].subLord,
      significators: { 2: chart.significators[2] || [], 11: chart.significators[11] || [] },
      rulingPlanets: chart.rulingPlanets,
      text: 'Judged from the 2nd (possession / recovery), 11th (return), 4th (within the premises), 7th (finder / thief) and 6th (loss). ' +
        'The 2nd cusp sub-lord ' + chart.cusps[1].subLord + ' with the 2nd / 11th significators decides recovery.'
    };

    const answer = {
      question: question, handler: 'missingItem', governingHouses: houses,
      whether: whether, why: why, kp: kpText, hora: horaText,
      missingItem: mi, attribution: ATTRIBUTION
    };

    if (wants('WHEN')) {
      answer.when = {
        text: mi.thief ? ('Regarding the timing, ' + mi.thief.timing + '.')
          : (recovered
            ? 'Recovery is shown during the period of the 2nd / 11th significators and the agreeing ruling planets.'
            : 'A clear time for recovery is not promised; await a stronger period of the recovery significators.')
      };
    }
    if (wants('WHO')) {
      const planet = chart.cusps[6].subLord;
      answer.who = {
        planet: planet, house: 7,
        profile: mi.thief ? mi.thief.profile : (buildFromPlanet(planet) + '; in relationship, ' + relationFromHouse(7)),
        text: 'The finder or taker is shown by the 7th cusp sub-lord ' + planet + ' \u2014 ' + buildFromPlanet(planet) + '.'
      };
    }
    if (wants('WHERE')) {
      let element, signName, direction;
      const planet = mi.sigPlanet;
      const p = planetByName(chart, planet);
      const sign = signOf(p ? p.longitude : chart.cusps[1].longitude);
      element = SIGN_ELEMENT[sign];
      signName = SIGN_NAMES[sign];
      if (mi.status === 'lost' && mi.lostDetail) direction = mi.lostDetail.direction;
      else if (mi.status === 'misplaced') direction = DIRECTION[planet] || 'within the premises';
      else direction = (mi.thief ? mi.thief.origin : (DIRECTION[planet] || 'an uncertain bearing'));
      answer.where = {
        planet: planet, sign: signName, element: element, direction: direction,
        text: 'The location / direction is shown by the significator ' + planet + ' in the ' + element +
          ' sign ' + signName + ', toward the ' + direction + '.'
      };
    }
    if (wants('HOW')) {
      const supporting = dedup((chart.significators[2] || []).concat(chart.significators[11] || []));
      const obstructing = dedup((chart.significators[6] || []).concat(chart.significators[8] || []).concat(chart.significators[12] || []));
      answer.how = {
        supporting: supporting, obstructing: obstructing,
        text: 'Recovery is supported by the significators of the 2nd and 11th (' + listText(supporting.length ? supporting : ['none']) +
          ') and obstructed by those of the 6th, 8th and 12th (' + listText(obstructing.length ? obstructing : ['none']) + ').'
      };
    }
    return answer;
  }

  interpret.answerQuestion = function answerQuestion(question, chart) {
    const catalog = KPApp.catalog;
    const handler = catalog.resolveHandler(question); // throws a descriptive error if absent
    const interrogs = question.interrogatives || [];
    function wants(name) { return interrogs.indexOf(name) >= 0; }

    if (handler === 'missingItem') {
      return answerMissingItem(question, chart, wants);
    }

    const houses = question.governingHouses.slice();
    const config = CATEGORY_CONFIG[handler];
    const j = interpret.gatherJudgment(chart, houses, config);
    const kpText = interpret.kpReasoning(handler, chart);
    const horaText = interpret.horaShastraReasoning(handler, chart);

    const answer = {
      question: question,
      handler: handler,
      governingHouses: houses,
      whether: buildWhether(j, config),   // always
      why: buildWhy(question, chart, j),  // always
      kp: kpText,
      hora: horaText,
      attribution: ATTRIBUTION
    };

    if (wants('WHEN')) answer.when = buildWhen(j);
    if (wants('WHO')) answer.who = buildWho(handler, chart, j);
    if (wants('WHERE')) answer.where = buildWhere(chart, j);
    if (wants('HOW')) answer.how = buildHow(j);

    return answer;
  };

  // In-memory list of custom (user-submitted) questions; the UI layer loads
  // these from localStorage on init and appends new ones at runtime.
  catalog._custom = [];

  // Built-in catalog merged with any loaded custom questions.
  catalog.getCatalog = function getCatalog() {
    return catalog.mergeCustom(catalog.QUESTION_CATALOG, catalog._custom);
  };

  // Group questions under house headings (1..12 then 'missing').
  catalog.groupByHouse = function groupByHouse(questions) {
    const groups = {};
    for (let h = 1; h <= 12; h++) groups[h] = [];
    groups.missing = [];
    (questions || []).forEach(function (q) {
      const key = (q.house === 'missing') ? 'missing' : q.house;
      if (!groups[key]) groups[key] = [];
      groups[key].push(q);
    });
    return groups;
  };

  // Trimmed, case-insensitive substring filter on question text; returns all
  // matches (mirrors ui.searchCities semantics, with no cap).
  catalog.searchCatalog = function searchCatalog(query, questions) {
    const list = questions || [];
    if (query == null) return list.slice();
    const q = String(query).trim().toLowerCase();
    if (!q) return list.slice();
    return list.filter(function (item) {
      return String(item.text || '').toLowerCase().indexOf(q) >= 0;
    });
  };

  // Reject empty/whitespace text or zero houses; otherwise ok.
  catalog.validateCustom = function validateCustom(text, houses) {
    if (text == null || String(text).trim() === '') {
      return { ok: false, message: 'Please enter the question text.' };
    }
    if (!Array.isArray(houses) || houses.length === 0) {
      return { ok: false, message: 'Please select at least one governing house.' };
    }
    const allValid = houses.every(function (h) {
      return typeof h === 'number' && Math.floor(h) === h && h >= 1 && h <= 12;
    });
    if (!allValid) {
      return { ok: false, message: 'Governing houses must be whole numbers between 1 and 12.' };
    }
    return { ok: true };
  };

  // Build a normalised custom question (primary house = min(houses);
  // handler derived via HOUSE_DEFAULT_HANDLER; full interrogative set).
  catalog.makeCustomQuestion = function makeCustomQuestion(text, houses) {
    const sorted = houses.slice().sort(function (a, b) { return a - b; });
    const primary = sorted[0];
    const handler = catalog.HOUSE_DEFAULT_HANDLER[primary];
    const id = 'custom-' + primary + '-' + Date.now().toString(36) + '-' +
      Math.random().toString(36).slice(2, 7);
    return {
      id: id,
      house: primary,
      text: String(text).trim(),
      governingHouses: sorted,
      handler: handler,
      interrogatives: ALL_INTERROGATIVES.slice(),
      custom: true,
      source: 'user'
    };
  };

  // Pure merge of built-ins + persisted customs.
  catalog.mergeCustom = function mergeCustom(base, customList) {
    return (base || []).slice().concat(customList || []);
  };

  // Return the handler key, validating it exists in interpret.CATEGORY_HOUSES.
  catalog.resolveHandler = function resolveHandler(question) {
    const handler = question && question.handler;
    if (!handler || !interpret.CATEGORY_HOUSES[handler]) {
      throw new Error('No interpretation handler available for this question' +
        (question && question.id ? ' ("' + question.id + '")' : '') +
        ': handler "' + handler + '" is not defined in the application.');
    }
    return handler;
  };

  // Quick lookup by case-insensitive city name.
  ui.findCity = function findCity(name) {
    if (!name) return null;
    const key = String(name).trim().toLowerCase();
    for (let i = 0; i < ui.CITIES.length; i++) {
      if (ui.CITIES[i].name.toLowerCase() === key) return ui.CITIES[i];
    }
    return null;
  };

  // DOM-free substring search over ui.CITIES.
  // Returns the cities whose name contains `query` (case-insensitive,
  // trimmed) as a substring. Prefix matches are ranked before mid-string
  // matches, then alphabetically within each group. The result is capped to
  // `limit` (default 12) for display; ranking and capping affect order and
  // visibility only, never which cities qualify as matches.
  ui.searchCities = function searchCities(query, limit) {
    if (query == null) return [];
    const q = String(query).trim().toLowerCase();
    if (!q) return [];
    const cap = (typeof limit === 'number' && limit > 0) ? limit : 12;
    const prefix = [];
    const mid = [];
    for (let i = 0; i < ui.CITIES.length; i++) {
      const c = ui.CITIES[i];
      const lower = c.name.toLowerCase();
      const idx = lower.indexOf(q);
      if (idx === 0) prefix.push(c);
      else if (idx > 0) mid.push(c);
    }
    const byName = function (a, b) { return a.name.localeCompare(b.name); };
    prefix.sort(byName);
    mid.sort(byName);
    return prefix.concat(mid).slice(0, cap);
  };

  // --- Small formatting helpers (DOM-free) ------------------------------

  // Degree formatted as DD MM' Sign.
  ui.fmtDeg = function fmtDeg(lon) {
    const L = normalize360(lon);
    const s = Math.floor(L / 30) % 12;
    const within = L - Math.floor(L / 30) * 30;
    let d = Math.floor(within);
    let m = Math.round((within - d) * 60);
    if (m === 60) { d += 1; m = 0; }
    return d + '\u00b0' + (m < 10 ? '0' : '') + m + "' " + ui.SIGN_NAMES[s];
  };

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function categoryLabel(key) {
    for (let i = 0; i < ui.CATEGORIES.length; i++) {
      if (ui.CATEGORIES[i].key === key) return ui.CATEGORIES[i].label;
    }
    return key;
  }

  function weekdayName(idx) {
    return ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][((idx % 7) + 7) % 7];
  }

  // Weekday (0=Sun..6=Sat) of a civil date string "YYYY-MM-DD".
  ui.weekdayOf = function weekdayOf(dateStr) {
    const dm = /^(\d{1,4})-(\d{1,2})-(\d{1,2})$/.exec(String(dateStr).trim());
    if (!dm) return null;
    const dt = new Date(Date.UTC(parseInt(dm[1], 10), parseInt(dm[2], 10) - 1, parseInt(dm[3], 10)));
    return dt.getUTCDay();
  };

  // --- Validation (Part C) ----------------------------------------------
  // Returns { ok:true, value:{...} } or { ok:false, message:'...' }.
  ui.validateInput = function validateInput(raw) {
    if (!raw.date || !/^\d{1,4}-\d{1,2}-\d{1,2}$/.test(String(raw.date).trim())) {
      return { ok: false, message: 'Please provide a valid Date.' };
    }
    if (!raw.time || !/^\d{1,2}:\d{1,2}(?::\d{1,2})?$/.test(String(raw.time).trim())) {
      return { ok: false, message: 'Please provide a valid Time.' };
    }
    const lat = parseFloat(raw.lat);
    if (raw.lat === '' || raw.lat == null || !isFinite(lat) || lat < -90 || lat > 90) {
      return { ok: false, message: 'Please provide a valid Latitude between -90 and 90.' };
    }
    const lon = parseFloat(raw.lon);
    if (raw.lon === '' || raw.lon == null || !isFinite(lon) || lon < -180 || lon > 180) {
      return { ok: false, message: 'Please provide a valid Longitude between -180 and 180.' };
    }
    const tz = parseFloat(raw.tz);
    if (raw.tz === '' || raw.tz == null || !isFinite(tz)) {
      return { ok: false, message: 'Please provide a valid numeric Timezone offset (hours).' };
    }
    const category = raw.category;
    const questionId = (raw.questionId == null) ? '' : String(raw.questionId).trim();
    if (raw.mode !== 'mooka' && !questionId && (!category || !interpret.CATEGORY_HOUSES[category])) {
      return { ok: false, message: 'Please select a Prashna question or a Query category.' };
    }

    // Horary number is optional, but if present must be an integer in range.
    let horary = null;
    const hraw = (raw.horary == null) ? '' : String(raw.horary).trim();
    if (hraw !== '') {
      const n = Number(hraw);
      if (!isFinite(n) || Math.floor(n) !== n || n < 1 || n > kp.HORARY_COUNT) {
        return {
          ok: false,
          message: 'KP Horary number must be a whole number between 1 and ' +
            kp.HORARY_COUNT + ' (or left blank).'
        };
      }
      horary = n;
    }

    return {
      ok: true,
      value: {
        date: String(raw.date).trim(),
        time: String(raw.time).trim(),
        lat: lat, lon: lon, tz: tz,
        category: category || '',
        questionId: questionId,
        horary: horary,
        place: raw.place ? String(raw.place).trim() : '',
        mode: raw.mode || 'manual'
      }
    };
  };

  // --- Pipeline (DOM-free) ----------------------------------------------
  // input must already be validated. Returns { chart, result }.
  ui.runAnalysis = function runAnalysis(input) {
    const jd = astro.localToJD(input.date, input.time, input.tz);
    let weekday = ui.weekdayOf(input.date);
    if (weekday == null) weekday = astro.weekdayIndex(jd);
    const opts = {
      jd: jd,
      latitude: input.lat,
      longitude: input.lon,
      timezone: input.tz,
      weekday: weekday,
      mode: input.mode || 'manual'
    };
    if (typeof input.horary === 'number') opts.horaryNumber = input.horary;
    const chart = kp.buildChart(opts);
    if (input.mode === 'mooka') {
      return { chart: chart, result: null, answer: null, mooka: interpret.analyzeMookaPrashna(chart) };
    }
    if (input.question) {
      const answer = interpret.answerQuestion(input.question, chart);
      return { chart: chart, result: null, answer: answer };
    }
    const result = interpret.interpret(input.category, chart);
    return { chart: chart, result: result, answer: null };
  };

  // --- Rendering helpers (DOM-free, return HTML strings) ----------------

  // Convert a "\n\n"-separated analysis string into <p> elements, bolding the
  // short leading label (text before the first period) of each paragraph.
  function renderParagraphs(text) {
    const paras = String(text || '').split(/\n\n+/);
    return paras.map(function (para) {
      const p = para.trim();
      if (!p) return '';
      const m = /^([^.]{1,60})\.\s+([\s\S]+)$/.exec(p);
      if (m) {
        return '<p><strong>' + esc(m[1]) + '.</strong> ' + esc(m[2]) + '</p>';
      }
      // Verdict lines get emphasis.
      if (/^(KP verdict|.*verdict is)/i.test(p)) {
        return '<p class="verdict-line">' + esc(p) + '</p>';
      }
      return '<p>' + esc(p) + '</p>';
    }).join('');
  }

  function card(title, bodyHtml) {
    return '<div class="card"><h2 class="section-title">' + esc(title) + '</h2>' + bodyHtml + '</div>';
  }

  function attributionHtml() {
    return '<div class="card results-attribution"><span class="dev">Developed by Dr. Anil Sabaji</span>, ' +
      'Email: <a href="mailto:anilsabaji@gmail.com">anilsabaji@gmail.com</a></div>';
  }

  // 1. Prashna Details card.
  function prashnaDetailsCard(input, chart) {
    const rows = [];
    function row(k, v) { rows.push('<tr><th>' + esc(k) + '</th><td>' + v + '</td></tr>'); }
    row('Date', esc(input.date));
    row('Time', esc(input.time));
    if (input.place) row('Place', esc(input.place));
    row('Latitude', esc(input.lat.toFixed(4)) + '&deg;');
    row('Longitude', esc(input.lon.toFixed(4)) + '&deg;');
    row('Timezone', 'UTC' + (input.tz >= 0 ? '+' : '') + input.tz);
    row('Mode', esc(chart.meta.mode === 'instant' ? 'Instant Prashna' : (chart.meta.mode === 'mooka' ? 'Mooka Prashna (Silent Query)' : 'Manual Prashna')));
    row('Ayanamsa (KP)', ui.fmtDeg(chart.ayanamsa).replace(/ [A-Za-z]+$/, '') + ' (' + chart.ayanamsa.toFixed(4) + '&deg;)');
    row('Weekday', esc(weekdayName(chart.meta.weekday)));
    row('Query', esc(input.questionText ? input.questionText : categoryLabel(input.category)));
    if (chart.horaryAscendant) {
      row('Horary Number', esc(chart.horaryNumber) + ' of ' + kp.HORARY_COUNT);
      row('Horary Ascendant', ui.fmtDeg(chart.horaryAscendant.degree) +
        ' &mdash; sub-lord <strong>' + esc(chart.horaryAscendant.subLord) + '</strong>' +
        ' (star-lord ' + esc(chart.horaryAscendant.starLord) + ', sign-lord ' + esc(chart.horaryAscendant.signLord) + ')');
    } else if (input.horary != null) {
      row('Horary Number', esc(input.horary) + ' (out of range &mdash; not applied)');
    } else {
      row('Horary Number', '<em>not provided</em>');
    }
    return card('Prashna Details', '<table>' + rows.join('') + '</table>');
  }

  // 2. Planetary Positions card.

  // 8. Missing-item findings card.
  function missingItemCard(result) {
    const mi = result.missingItem;
    if (!mi) return '';
    const rows = [];
    function row(k, v) { rows.push('<tr><th>' + esc(k) + '</th><td>' + esc(v) + '</td></tr>'); }
    row('Status', mi.status.toUpperCase());
    row('Age', mi.age === 'old' ? 'Old / used object' : 'New / recently acquired');
    row('Significator', mi.sigPlanet);
    row('Material / type', mi.material);
    let detailHtml = '';
    if (mi.status === 'misplaced' && mi.location) {
      detailHtml = '<p>' + esc(mi.location.description) + '</p>';
    } else if (mi.status === 'lost' && mi.lostDetail) {
      row('Direction', mi.lostDetail.direction);
      row('Distance', mi.lostDetail.distance);
      row('Landmarks', mi.lostDetail.landmarks);
      detailHtml = '<p>' + esc(mi.lostDetail.description) + '</p>';
    } else if (mi.status === 'stolen' && mi.thief) {
      row('Thief profile', mi.thief.profile);
      row('Origin / bearing', mi.thief.origin);
      row('Still holds item', mi.thief.stillHasItem ? 'Likely yes' : 'May have passed it on');
      row('Recovery', (mi.thief.willRecover ? 'Indicated \u2014 ' : 'Doubtful \u2014 ') + mi.thief.timing);
    }
    return card('Missing Article \u2014 Findings', '<table>' + rows.join('') + '</table>' + detailHtml);
  }

  // Build the full results HTML (DOM-free). input is the validated value.
  ui.buildResultsHtml = function buildResultsHtml(input, chart, result) {
    let html = '';
    html += ui.printBarHtml();
    html += prashnaDetailsCard(input, chart);
    html += planetTableCard(chart);
    html += cuspTableCard(chart);
    html += significatorsCard(chart);
    html += rulingPlanetsCard(chart);
    html += card('KP Analysis (with Ruling Planets)', '<div class="analysis">' + renderParagraphs(result.kp) + '</div>');
    html += card('Hora Shastra Analysis', '<div class="analysis">' + renderParagraphs(result.horaShastra) + '</div>');
    if (input.category === 'missingItem') html += missingItemCard(result);
    html += attributionHtml();
    return html;
  };

  // Render the interrogative-labelled sections (only those present in the
  // answer): Whether, When, Who, Where, How, Why. WHETHER and WHY always
  // appear; the optional ones appear only when produced.
  function answerInterrogativesHtml(answer) {
    let html = '';
    function sec(title, obj) {
      if (!obj || !obj.text) return;
      html += card(title, '<div class="analysis"><p>' + esc(obj.text) + '</p></div>');

    sec('Whether \u2014 Outcome', answer.whether);
    sec('When \u2014 Timing', answer.when);

    sec('How \u2014 Manner & Conditions', answer.how);
    sec('Why \u2014 Astrological Reasoning', answer.why);

  // Defensively load persisted custom questions; returns [] on missing /
  // corrupt data. No network request is performed.
  ui.loadCustomQuestions = function loadCustomQuestions() {
    try {
      if (typeof localStorage === 'undefined' || !localStorage) return [];
      const raw = localStorage.getItem(ui.CUSTOM_STORAGE_KEY);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (e) {
      return [];
    }
  };

  // Append a custom question to localStorage (best-effort, offline).
  ui.saveCustomQuestion = function saveCustomQuestion(q) {
    try {
      if (typeof localStorage === 'undefined' || !localStorage) return false;
      const list = ui.loadCustomQuestions();
      list.push(q);
      localStorage.setItem(ui.CUSTOM_STORAGE_KEY, JSON.stringify(list));
      return true;
    } catch (e) {
      return false;
    }
  };

  function $(id) { return document.getElementById(id); }

  function showMsg(el, text, kind) {
    if (!el) return;
    el.textContent = text;
    el.className = 'form-msg ' + (kind || 'error') + ' show';
  }
  function hideMsg(el) {
    if (!el) return;
    el.textContent = '';
    el.className = 'form-msg ' + (el.classList.contains('info') ? 'info' : 'error');
  }

  // Deterministically fill lat/lon/tz for a chosen city, independent of the
  // browser's native `change` event. Sets the input value to the city name
  // and closes the suggestion dropdown.
  function selectCity(prefix, city) {
    if (!city) return;
    const cityEl = $(prefix + '-city');
    const latEl = $(prefix + '-lat');
    const lonEl = $(prefix + '-lon');
    const tzEl = $(prefix + '-tz');
    if (latEl) latEl.value = city.lat;
    if (lonEl) lonEl.value = city.lon;
    if (tzEl) tzEl.value = city.tz;
    if (cityEl) cityEl.value = city.name;
    closeCityList(prefix);
  }

  // Hide the suggestion list and reset combobox state for a prefix.
  function closeCityList(prefix) {
    const listEl = $(prefix + '-city-list');
    const cityEl = $(prefix + '-city');
    if (listEl) {
      listEl.classList.add('hidden');
      listEl.innerHTML = '';
    }
    if (cityEl) {
      cityEl.setAttribute('aria-expanded', 'false');
      cityEl.removeAttribute('aria-activedescendant');
    }
  }

  // Wire the custom, accessible, offline city autocomplete for a form prefix.
  // Replaces the previous wireCityAutofill (native datalist + change event).
  function wireCityAutocomplete(prefix) {
    const cityEl = $(prefix + '-city');
    const listEl = $(prefix + '-city-list');
    const noteEl = $(prefix + '-city-note');
    if (!cityEl || !listEl) return;

    let matches = [];
    let activeIndex = -1;

    function setActive(idx) {
      const opts = listEl.children;
      for (let i = 0; i < opts.length; i++) opts[i].classList.remove('active');
      activeIndex = idx;
      if (idx >= 0 && idx < opts.length) {
        const opt = opts[idx];
        opt.classList.add('active');
        cityEl.setAttribute('aria-activedescendant', opt.id);
        if (opt.scrollIntoView) opt.scrollIntoView({ block: 'nearest' });
      } else {
        cityEl.removeAttribute('aria-activedescendant');
      }
    }

    function hideNote() {
      if (noteEl) { noteEl.classList.add('hidden'); noteEl.textContent = ''; }
    }
    function showNote() {
      if (noteEl) {
        noteEl.textContent = 'No matching city \u2014 enter coordinates manually';
        noteEl.classList.remove('hidden');
      }
    }

    function render() {
      listEl.innerHTML = '';
      for (let i = 0; i < matches.length; i++) {
        const c = matches[i];
        const li = document.createElement('li');
        li.id = prefix + '-city-opt-' + i;
        li.setAttribute('role', 'option');
        li.textContent = c.name;
        li.dataset.index = String(i);
        // Use mousedown to fill before the input loses focus (avoids blur race).
        li.addEventListener('mousedown', function (ev) {
          ev.preventDefault();
          const idx = Number(this.dataset.index);
          selectCity(prefix, matches[idx]);
        });
        li.addEventListener('click', function () {
          const idx = Number(this.dataset.index);
          selectCity(prefix, matches[idx]);
        });
        li.addEventListener('touchend', function (ev) {
          ev.preventDefault();
          const idx = Number(this.dataset.index);
          selectCity(prefix, matches[idx]);
        });
        listEl.appendChild(li);
      }
      listEl.classList.remove('hidden');
      cityEl.setAttribute('aria-expanded', 'true');
      setActive(-1);
    }

    cityEl.addEventListener('input', function () {
      const raw = cityEl.value;
      matches = ui.searchCities(raw);
      if (matches.length > 0) {
        hideNote();
        render();
      } else if (raw.trim() !== '') {
        closeCityList(prefix);
        showNote();
      } else {
        closeCityList(prefix);
        hideNote();
      }
    });

    cityEl.addEventListener('keydown', function (ev) {
      const open = !listEl.classList.contains('hidden') && matches.length > 0;
      if (ev.key === 'ArrowDown') {
        if (!open) return;
        ev.preventDefault();
        setActive(activeIndex + 1 >= matches.length ? 0 : activeIndex + 1);
      } else if (ev.key === 'ArrowUp') {
        if (!open) return;
        ev.preventDefault();
        setActive(activeIndex - 1 < 0 ? matches.length - 1 : activeIndex - 1);
      } else if (ev.key === 'Enter') {
        if (open && activeIndex >= 0 && activeIndex < matches.length) {
          ev.preventDefault();
          selectCity(prefix, matches[activeIndex]);
        }
      } else if (ev.key === 'Escape') {
        closeCityList(prefix);
      }
    });

    // Close the dropdown when clicking outside the combobox.
    document.addEventListener('click', function (ev) {
      const combo = $(prefix + '-city-combo');
      if (combo && !combo.contains(ev.target)) {
        closeCityList(prefix);
      }
    });
  }

  // The active catalog (built-ins + loaded customs) used by the pickers.

  // custom questions, and load them into the pure catalog layer too.

    ui._catalog = KPApp.catalog.getCatalog();
    return ui._catalog;
  };

  // Look up a question by id in the active catalog.
  ui.getQuestionById = function getQuestionById(id) {
    const list = ui._catalog || ui.refreshCatalog();
    for (let i = 0; i < list.length; i++) {
      if (list[i].id === id) return list[i];
    }
    return null;
  };

  function houseHeadingLabel(key) {
    return (key === 'missing') ? 'Missing / Lost Article' : ('House ' + key);
  }

  // Hide and clear a prefix's question suggestion list.
  function closeQuestionList(prefix) {
    const listEl = $(prefix + '-question-list');
    const inputEl = $(prefix + '-question');

  // Clear the active question selection for a prefix.
  function clearQuestion(prefix) {
    const idEl = $(prefix + '-question-id');

  // Record a selected question: set hidden id, fill the input, show the
  // governing houses, and clear the Query Category (mutual exclusivity).
  function selectQuestion(prefix, q) {
    if (!q) return;
    const inputEl = $(prefix + '-question');
    const idEl = $(prefix + '-question-id');
    const metaEl = $(prefix + '-question-meta');
    const catEl = $(prefix + '-category');
    if (inputEl) inputEl.value = q.text;
    if (idEl) idEl.value = q.id;
    if (catEl) catEl.value = '';            // mutual exclusivity
    ui.activeQuestion = q;
    if (metaEl) {
      metaEl.innerHTML = 'Grouped under <strong>' + esc(houseHeadingLabel(q.house)) +
        '</strong> &middot; Governing houses: <strong>' + esc((q.governingHouses || []).join(', ')) + '</strong>';
      metaEl.classList.remove('hidden');
    }
    closeQuestionList(prefix);

  // Render the grouped suggestion list (house headings then option rows).
  function renderQuestionList(prefix, matches) {
    const listEl = $(prefix + '-question-list');
    const inputEl = $(prefix + '-question');
    if (!listEl) return;
    listEl.innerHTML = '';
    const groups = KPApp.catalog.groupByHouse(matches);
    const order = [];
    for (let h = 1; h <= 12; h++) order.push(h);
    order.push('missing');
    let any = false;
    order.forEach(function (key) {
      const arr = groups[key] || [];
      if (!arr.length) return;
      any = true;
      const head = document.createElement('li');
      head.setAttribute('role', 'presentation');
      head.className = 'q-group-heading';
      head.textContent = houseHeadingLabel(key);
      listEl.appendChild(head);
      arr.forEach(function (q) {
        const li = document.createElement('li');
        li.setAttribute('role', 'option');
        li.className = 'q-option';
        li.textContent = q.text;
        li.dataset.qid = q.id;
        li.addEventListener('mousedown', function (ev) {
          ev.preventDefault();
          selectQuestion(prefix, ui.getQuestionById(this.dataset.qid));
        });
        li.addEventListener('click', function () {
          selectQuestion(prefix, ui.getQuestionById(this.dataset.qid));
        });
        li.addEventListener('touchend', function (ev) {
          ev.preventDefault();
          selectQuestion(prefix, ui.getQuestionById(this.dataset.qid));
        });
        listEl.appendChild(li);
      });
    });
    if (any) {
      listEl.classList.remove('hidden');
      if (inputEl) inputEl.setAttribute('aria-expanded', 'true');
    } else {
      closeQuestionList(prefix);
    }
  }

  // Wire the searchable, house-grouped question picker for a prefix.
  function wireQuestionPicker(prefix) {
    const inputEl = $(prefix + '-question');
    const listEl = $(prefix + '-question-list');
    const catEl = $(prefix + '-category');
    if (!inputEl || !listEl) return;

    function openAll() {
      renderQuestionList(prefix, ui._catalog || ui.refreshCatalog());
    }

    inputEl.addEventListener('input', function () {
      const q = inputEl.value;
      // Typing invalidates a prior selection until a new pick is made.
      const idEl = $(prefix + '-question-id');
      if (idEl && idEl.value) clearQuestion(prefix);
      const matches = KPApp.catalog.searchCatalog(q, ui._catalog || ui.refreshCatalog());
      renderQuestionList(prefix, matches);
    });

    inputEl.addEventListener('focus', function () {
      if (!$(prefix + '-question-id').value && !inputEl.value.trim()) openAll();
    });

    inputEl.addEventListener('keydown', function (ev) {
      if (ev.key === 'Escape') closeQuestionList(prefix);
    });

    // Mutual exclusivity: choosing a category clears the active question.
    if (catEl) {
      catEl.addEventListener('change', function () {
        if (catEl.value) {
          if (inputEl) inputEl.value = '';
          clearQuestion(prefix);
          closeQuestionList(prefix);
        }
      });
    }

    // Close the dropdown when clicking outside the combobox.
    document.addEventListener('click', function (ev) {
      const combo = $(prefix + '-question-combo');
      if (combo && !combo.contains(ev.target)) closeQuestionList(prefix);
    });
  }

  // Wire the custom-question form (validate, add, persist, re-render picker).
  function wireCustomQuestion(prefix) {
    const btn = $(prefix + '-custom-add');
    if (!btn) return;
    btn.addEventListener('click', function () {
      const msgEl = $(prefix + '-custom-msg');
      hideMsg(msgEl);
      const textEl = $(prefix + '-custom-text');
      const text = textEl ? textEl.value : '';
      const houses = [];
      for (let h = 1; h <= 12; h++) {
        const chk = $(prefix + '-ch-' + h);
        if (chk && chk.checked) houses.push(h);
      }
      const v = KPApp.catalog.validateCustom(text, houses);
      if (!v.ok) {
        showMsg(msgEl, v.message, 'error');
        return;
      }
      const q = KPApp.catalog.makeCustomQuestion(text, houses);
      ui.saveCustomQuestion(q);
      ui.refreshCatalog();
      // Reset the form fields.
      if (textEl) textEl.value = '';
      for (let h = 1; h <= 12; h++) {
        const chk = $(prefix + '-ch-' + h);
        if (chk) chk.checked = false;
      }
      showMsg(msgEl, 'Added under House ' + q.house + '. You can now search and select it above.', 'info');
      // Select the newly added question for immediate use.
      selectQuestion(prefix, q);
    });
  }

  // Gather raw form values for a prefix.
  function gatherForm(prefix, mode) {
    return {
      date: $(prefix + '-date') ? $(prefix + '-date').value : '',
      time: $(prefix + '-time') ? $(prefix + '-time').value : '',
      place: $(prefix + '-city') ? $(prefix + '-city').value : '',
      lat: $(prefix + '-lat') ? $(prefix + '-lat').value : '',
      lon: $(prefix + '-lon') ? $(prefix + '-lon').value : '',
      tz: $(prefix + '-tz') ? $(prefix + '-tz').value : '',
      category: $(prefix + '-category') ? $(prefix + '-category').value : '',
      questionId: $(prefix + '-question-id') ? $(prefix + '-question-id').value : '',
      horary: $(prefix + '-horary') ? $(prefix + '-horary').value : '',
      mode: mode
    };
  }

  // Render rendered-report HTML into #results, wire the Print / Save as PDF
  // button to the browser's native print dialog, and smooth-scroll into view.
  // Shared by the manual, instant and Mooka analyze handlers so the wiring
  // lives in exactly one place.
  ui.renderResults = function renderResults(html) {
    const results = $('results');
    if (!results) return;
    results.innerHTML = html;
    const printBtn = $('print-report');
    if (printBtn) {
      printBtn.addEventListener('click', function () {
        if (typeof window === 'undefined' || typeof window.print !== 'function') return;
        // Browsers use document.title as the default PDF filename, so override
        // it just for the duration of the print call, then restore it.
        var prevTitle = (typeof document !== 'undefined') ? document.title : null;
        var restore = function () {
          if (prevTitle != null && typeof document !== 'undefined') document.title = prevTitle;
          if (typeof window.removeEventListener === 'function') window.removeEventListener('afterprint', restore);
        };
        if (typeof document !== 'undefined') document.title = 'KP-Prashna-Report';
        if (typeof window.addEventListener === 'function') window.addEventListener('afterprint', restore);
        try { window.print(); } finally { restore(); }
      });
    }
    if (results.scrollIntoView) {
      results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  };

  // Attach the analyze handler for a form prefix.
  function wireAnalyze(prefix, mode) {
    const btn = $(prefix + '-analyze');
    if (!btn) return;
    btn.addEventListener('click', function () {
      const errEl = $(prefix + '-error');
      hideMsg(errEl);
      try {
        const raw = gatherForm(prefix, mode);
        const v = ui.validateInput(raw);
        if (!v.ok) {
          showMsg(errEl, v.message, 'error');
          return;
        }
        if (v.value.questionId) {
          const q = ui.getQuestionById(v.value.questionId);
          if (!q) {
            showMsg(errEl, 'The selected question could not be found. Please pick it again.', 'error');
            return;
          }
          v.value.question = q;
          v.value.questionText = q.text;
        }
        const out = ui.runAnalysis(v.value);
        const html = out.answer
          ? ui.buildAnswerHtml(v.value, out.chart, out.answer)
          : ui.buildResultsHtml(v.value, out.chart, out.result);
        ui.renderResults(html);
      } catch (e) {
        showMsg(errEl, 'Could not cast the chart: ' + (e && e.message ? e.message : String(e)) +
          '. Please check your inputs and try again.', 'error');
      }
    });
  }

  // Attach the Mooka (silent query) analyze handler. Gathers only the
  // date/time/place form values, validates them in mooka mode (no question /
  // category required), runs the engine and renders the ranked candidates.
  function wireMookaAnalyze(prefix) {
    const btn = $(prefix + '-analyze');
    if (!btn) return;
    btn.addEventListener('click', function () {
      const errEl = $(prefix + '-error');
      hideMsg(errEl);
      try {
        const raw = gatherForm(prefix, 'mooka');
        const v = ui.validateInput(raw);
        if (!v.ok) {
          showMsg(errEl, v.message, 'error');
          return;
        }
        v.value.questionText = 'Mooka Prashna \u2014 silent query';
        const out = ui.runAnalysis(v.value);
        const html = ui.buildMookaResultsHtml(v.value, out.chart, out.mooka);
        ui.renderResults(html);
      } catch (e) {
        showMsg(errEl, 'Could not cast the chart: ' + (e && e.message ? e.message : String(e)) +
          '. Please check your inputs and try again.', 'error');
      }
    });
  }

  // Prefill date/time with the current device moment for a prefix.
  function prefillNow(prefix) {
    const now = new Date();
    const pad = function (n) { return (n < 10 ? '0' : '') + n; };
    const dEl = $(prefix + '-date');
    const tEl = $(prefix + '-time');
    if (dEl) dEl.value = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate());
    if (tEl) tEl.value = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  }

  // Request geolocation for a form prefix and fill {prefix}-lat/-lon/-tz,
  // writing status into {prefix}-geo. Used by both the Instant and Mooka
  // tabs; every field stays editable so the user can confirm or change it.
  function requestLocationFor(prefix) {
    const geoEl = $(prefix + '-geo');
    const tz = -(new Date().getTimezoneOffset()) / 60;
    if ($(prefix + '-tz') && !$(prefix + '-tz').value) $(prefix + '-tz').value = tz;

    if (typeof navigator === 'undefined' || !navigator.geolocation) {
      showMsg(geoEl, 'Geolocation is not available. Please enter the latitude, longitude and timezone manually below.', 'info');
      return;
    }
    showMsg(geoEl, 'Detecting the current location\u2026', 'info');
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        if ($(prefix + '-lat')) $(prefix + '-lat').value = pos.coords.latitude.toFixed(4);
        if ($(prefix + '-lon')) $(prefix + '-lon').value = pos.coords.longitude.toFixed(4);
        if ($(prefix + '-tz') && !$(prefix + '-tz').value) $(prefix + '-tz').value = tz;
        showMsg(geoEl, 'Location detected. Verify the date, time and place below, then analyze.', 'info');
      },
      function () {
        showMsg(geoEl, 'Location access was denied or unavailable. Please enter the latitude, ' +
          'longitude and timezone manually below.', 'info');
      },
      { enableHighAccuracy: false, timeout: 10000, maximumAge: 600000 }
    );
  }

  // Request geolocation for the Instant tab; fall back to manual entry.
  // Thin wrapper preserved for backward compatibility.
  function requestInstantLocation() {
    requestLocationFor('instant');
  }

  let instantPrimed = false;
  function primeInstant() {
    prefillNow('instant');
    requestInstantLocation();
    instantPrimed = true;
  }

  // Auto-fill the Mooka tab on first open: current device date/time plus the
  // current place via geolocation. Guarded so re-opening never overwrites
  // the user's manual edits. All fields remain editable.
  let mookaPrimed = false;
  function primeMooka() {
    prefillNow('mooka');
    requestLocationFor('mooka');
    mookaPrimed = true;
  }

  // Build both forms and the tab switching behaviour.
  ui.init = function init() {
    const area = $('form-area');
    if (area) {
      area.innerHTML =
        '<div id="manual-pane">' + buildFormHtml('manual', 'manual') + '</div>' +
        '<div id="instant-pane" class="hidden">' + buildFormHtml('instant', 'instant') + '</div>' +
        '<div id="mooka-pane" class="hidden">' + buildMookaFormHtml('mooka') + '</div>';
    }

    // City autocomplete + analyze handlers for both forms.
    wireCityAutocomplete('manual');
    wireCityAutocomplete('instant');
    wireCityAutocomplete('mooka');
    wireAnalyze('manual', 'manual');
    wireAnalyze('instant', 'instant');
    wireMookaAnalyze('mooka');

    // Load persisted custom questions and merge into the active catalog,
    // then wire the question picker and custom-question form for both forms.
    ui.refreshCatalog();
    wireQuestionPicker('manual');
    wireQuestionPicker('instant');
    wireCustomQuestion('manual');
    wireCustomQuestion('instant');

    // Default the manual date/time to "now" for convenience (editable).
    prefillNow('manual');
    prefillNow('mooka');

    // Tab switching.
    const tabManual = $('tab-manual');
    const tabInstant = $('tab-instant');
    const tabMooka = $('tab-mooka');
    const paneManual = $('manual-pane');
    const paneInstant = $('instant-pane');
    const paneMooka = $('mooka-pane');

    function activate(which) {
      const manualOn = (which === 'manual');
      const instantOn = (which === 'instant');
      const mookaOn = (which === 'mooka');
      if (tabManual) {
        tabManual.classList.toggle('active', manualOn);
        tabManual.setAttribute('aria-selected', manualOn ? 'true' : 'false');
      }
      if (tabInstant) {
        tabInstant.classList.toggle('active', instantOn);
        tabInstant.setAttribute('aria-selected', instantOn ? 'true' : 'false');
      }
      if (tabMooka) {
        tabMooka.classList.toggle('active', mookaOn);
        tabMooka.setAttribute('aria-selected', mookaOn ? 'true' : 'false');
      }
      if (paneManual) paneManual.classList.toggle('hidden', !manualOn);
      if (paneInstant) paneInstant.classList.toggle('hidden', !instantOn);
      if (paneMooka) paneMooka.classList.toggle('hidden', !mookaOn);
      if (instantOn && !instantPrimed) primeInstant();
      if (mookaOn && !mookaPrimed) primeMooka();
    }

    if (tabManual) tabManual.addEventListener('click', function () { activate('manual'); });
    if (tabInstant) tabInstant.addEventListener('click', function () { activate('instant'); });
    if (tabMooka) tabMooka.addEventListener('click', function () { activate('mooka'); });

    activate('manual');
  };

  if (typeof document !== "undefined" && document.addEventListener) {
    document.addEventListener("DOMContentLoaded", function () {
      KPApp.ui.init();
    });
  }

  global.KPApp = KPApp;
  // Also expose ATTRIBUTION as a top-level constant reference for convenience.
  global.ATTRIBUTION = ATTRIBUTION;

})(typeof window !== "undefined" ? window : this);
</script>
</body>
</html>
